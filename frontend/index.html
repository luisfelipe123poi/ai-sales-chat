<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AI Sales Chat</title>

  <style>
    body {
      font-family: Arial;
    }

    /* Botón flotante */
    #chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 24px;
      cursor: pointer;
    }

    /* Caja del chat */
    #chat-box {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 300px;
      height: 400px;
      background: white;
      border: 1px solid #ccc;
      display: none;
      flex-direction: column;
    }

    /* 🔥 FIX CRÍTICO */
    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;

      display: flex;
      flex-direction: column;
    }

    .msg {
      margin: 5px 0;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .user {
      text-align: right;
      color: blue;
    }

    .bot {
      text-align: left;
      color: green;
    }

    #input-area {
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button.send {
      padding: 10px;
    }
  </style>
</head>

<body>

<button id="chat-button">💬</button>

<div id="chat-box">
  <div id="messages"></div>

  <div id="input-area">
    <input id="input" placeholder="Escribe..." />
    <button class="send" onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
let leadId = null;
let conversationId = null;

// abrir chat
document.getElementById("chat-button").onclick = () => {
  const box = document.getElementById("chat-box");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
};

// 🔥 FIX SCROLL INTELIGENTE
function scrollToBottom() {
  const messages = document.getElementById("messages");

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      messages.scrollTop = messages.scrollHeight;
    });
  });
}

// agregar mensaje
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  const messages = document.getElementById("messages");
  messages.appendChild(div);

  scrollToBottom();

  return div;
}

// enviar mensaje
async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value;

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message,
      leadId,
      conversationId
    })
  });

  const data = await res.json();

  leadId = data.leadId;
  conversationId = data.conversationId;

  addMessage(data.reply, "bot");

  // 🔥 FIX FINAL (garantiza scroll incluso con texto largo)
  scrollToBottom();
}
</script>

</body>
</html>
