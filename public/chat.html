<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CONTENEDOR */
#chat {
  width: 400px;
  height: 650px;
  background: #fff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

/* HEADER */
#header {
  padding: 15px;
  color: white;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
}

#header img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

/* MENSAJES */
#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  background: #f9fafb;
  display: flex;
  flex-direction: column;
}

.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 15px;
  margin: 8px 0;
  font-size: 14px;
  line-height: 1.5;
  animation: fadeIn 0.2s ease;
  word-wrap: break-word;
  white-space: pre-line;
  flex-shrink: 0;
}

.user {
  background: #25D366;
  color: white;
  margin-left: auto;
  border-bottom-right-radius: 5px;
}

.bot {
  background: #e5e7eb;
  color: #111;
  border-bottom-left-radius: 5px;
}

/* INPUT */
#input-area {
  display: none;
  border-top: 1px solid #eee;
}

#input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
}

#sendBtn {
  padding: 0 20px;
  border: none;
  background: #25D366;
  color: white;
  cursor: pointer;
}

/* BOTÓN WHATSAPP */
#waBtn {
  display: none;
  margin: 10px;
  padding: 12px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* BOTONES OPCIONES */
#options {
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  background: #f9fafb;
}

.option-btn {
  padding: 10px 14px;
  border: none;
  border-radius: 12px;
  background: #25D366;
  color: white;
  cursor: pointer;
  font-weight: 500;
  font-size: 14px;
  animation: fadeIn 0.3s ease;
}

.option-btn:hover {
  filter: brightness(0.9);
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(5px);}
  to {opacity:1; transform: translateY(0);}
}

/* SCROLL */
#messages::-webkit-scrollbar {
  width: 5px;
}

#messages::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 10px;
}

/* ===================================== */
/* ⌨️ TYPING INDICATOR */
/* ===================================== */

.typing {
  min-width: 70px;
}

.typing-dots {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 12px;
}

.typing-dots span {
  width: 8px;
  height: 8px;
  background: #6b7280;
  border-radius: 50%;
  display: block;
  animation: typingBounce 1.4s infinite ease-in-out;
}

.typing-dots span:nth-child(1) {
  animation-delay: 0s;
}

.typing-dots span:nth-child(2) {
  animation-delay: .2s;
}

.typing-dots span:nth-child(3) {
  animation-delay: .4s;
}

@keyframes typingBounce {

  0%, 80%, 100% {
    transform: translateY(0);
    opacity: .3;
  }

  40% {
    transform: translateY(-5px);
    opacity: 1;
  }
}

.typing-dots {
  display: flex;
  align-items: center;
  gap: 5px;
}

.typing-dots span {
  width: 8px;
  height: 8px;
  background: #6b7280;
  border-radius: 50%;
  animation: blink 1.4s infinite both;
}

.typing-dots span:nth-child(2) {
  animation-delay: .2s;
}

.typing-dots span:nth-child(3) {
  animation-delay: .4s;
}

@keyframes blink {

  0% {
    opacity: .2;
    transform: translateY(0px);
  }

  20% {
    opacity: 1;
    transform: translateY(-2px);
  }

  100% {
    opacity: .2;
    transform: translateY(0px);
  }
}
</style>
</head>

<body>

<div id="chat">

  <div id="header"></div>

  <div id="messages"></div>

  <div id="options"></div>

  <button id="waBtn">
    Continuar por WhatsApp
  </button>

  <div id="input-area">

    <input
      id="input"
      placeholder="Escribe tu mensaje..."
    />

    <button
      id="sendBtn"
      onclick="sendMessage()"
    >
      Enviar
    </button>

  </div>

</div>

<script>

const API = "https://ai-sales-chat.onrender.com";

let leadId = null;
let conversationId = null;
let business = null;
let whatsappNumber = null;
let inputLocked = false;
let typingDiv = null;

// =====================================
// 🔥 SLUG FIX DEFINITIVO
// =====================================

const slug = window.location.pathname
  .replace("/chat/", "")
  .replace("/", "");

console.log("🔥 URL:", window.location.href);
console.log("🔥 PATHNAME:", window.location.pathname);
console.log("🔥 SLUG:", slug);

// =====================================
// VALIDAR SLUG
// =====================================

if(!slug){

  alert("Slug no encontrado");

  throw new Error("Slug no encontrado");
}

// =====================================
// LOAD BUSINESS
// =====================================

async function loadBusiness() {

  try{

    console.log("🔥 CARGANDO NEGOCIO");

    console.log(`${API}/business/${slug}`);

    const res = await fetch(`${API}/business/${slug}`);

    console.log("🔥 STATUS:", res.status);

    if(!res.ok){

      const errText = await res.text();

      console.log("❌ ERROR:", errText);

      throw new Error("Negocio no encontrado");
    }

    const data = await res.json();

    console.log("🔥 BUSINESS:", data);

    business = data;

    document.getElementById("header").style.background =
      business.primaryColor || "#25D366";

    document.getElementById("header").innerHTML = `
      <img src="${business.logo || 'https://placehold.co/100'}" />
      <div>
        <strong>${business.name || "Chat"}</strong><br/>
        <small>En línea</small>
      </div>
    `;

    // =====================================
    // 🔥 INICIAR CHAT AUTOMÁTICAMENTE
    // =====================================

    setInputState(false);

    setTimeout(() => {
      sendOption("start");
    }, 500);

  }catch(err){

    console.error("❌ LOAD BUSINESS ERROR:", err);

    addMessage(
      "❌ Negocio no encontrado o backend caído",
      "bot"
    );
  }
}

// =====================================
// 💬 AGREGAR MENSAJE
// =====================================

function addMessage(text, type) {

  const messages = document.getElementById("messages");

  const div = document.createElement("div");

  div.className = "msg " + type;

  const lines = String(text || "").split("\n");

  lines.forEach(line => {

    let cleanLine = line.trim();

    if (!cleanLine) return;

    // =====================================
    // 🔥 GOOGLE DRIVE FIX
    // =====================================

    if (cleanLine.includes("drive.google.com")) {

      const match =
        cleanLine.match(/\/d\/(.+?)\//) ||
        cleanLine.match(/id=(.+?)(&|$)/);

      if (match && match[1]) {

        const fileId = match[1];

        cleanLine =
          `https://lh3.googleusercontent.com/d/${fileId}`;
      }
    }

    // =====================================
    // 🖼️ IMÁGENES
    // =====================================

    if (
      cleanLine.match(/\.(jpeg|jpg|gif|png|webp)$/i) ||
      cleanLine.includes("googleusercontent.com")
    ) {

      const img = document.createElement("img");

      img.src = cleanLine;

      img.style.maxWidth = "100%";
      img.style.borderRadius = "10px";
      img.style.marginTop = "5px";
      img.style.display = "block";

      img.onerror = function() {

        this.style.display = "none";

        const a = document.createElement("a");

        a.href = line;
        a.innerText = "Ver testimonio 🔗";
        a.target = "_blank";

        a.style.display = "block";
        a.style.marginTop = "5px";
        a.style.color = "#2563eb";
        a.style.fontWeight = "bold";

        div.appendChild(a);
      };

      div.appendChild(img);
    }

    // =====================================
    // 🎥 VIDEOS
    // =====================================

    else if (
      cleanLine.match(/\.(mp4|webm|ogg)$/i)
    ) {

      const video = document.createElement("video");

      video.src = cleanLine;

      video.controls = true;

      video.style.maxWidth = "100%";
      video.style.borderRadius = "10px";
      video.style.marginTop = "5px";
      video.style.display = "block";

      div.appendChild(video);
    }

    // =====================================
    // 🔗 LINKS
    // =====================================

    else if (
      cleanLine.startsWith("http")
    ) {

      const a = document.createElement("a");

      a.href = cleanLine;

      a.innerText = "Ver testimonio 🔗";

      a.target = "_blank";

      a.style.display = "block";
      a.style.marginTop = "5px";
      a.style.color = "#2563eb";
      a.style.fontWeight = "bold";

      div.appendChild(a);
    }

    // =====================================
    // 🧾 TEXTO
    // =====================================

    else {

      const p = document.createElement("div");

      p.innerText = line;

      div.appendChild(p);
    }

  });

  messages.appendChild(div);

  setTimeout(() => {

    messages.scrollTo({
      top: messages.scrollHeight,
      behavior: "smooth"
    });

  }, 50);
}

// =====================================
// ⌨️ MOSTRAR ESCRIBIENDO
// =====================================

function showTyping() {

  hideTyping();

  const messages = document.getElementById("messages");

  typingDiv = document.createElement("div");

  // 🔥 IMPORTANTE
  typingDiv.className = "msg bot typing";

  typingDiv.innerHTML = `

    <div style="
      font-size:12px;
      color:#6b7280;
      margin-bottom:6px;
      font-weight:600;
    ">
      Escribiendo...
    </div>

    <div class="typing-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>

  `;

  messages.appendChild(typingDiv);

  // 🔥 FORZAR REPAINT
  typingDiv.offsetHeight;

  messages.scrollTo({
    top: messages.scrollHeight,
    behavior: "smooth"
  });
}

// =====================================
// ❌ OCULTAR ESCRIBIENDO
// =====================================

function hideTyping() {

  if (typingDiv) {

    typingDiv.remove();

    typingDiv = null;
  }
}

// =====================================
// 🔥 MOSTRAR OPCIONES
// =====================================

function showOptions(options) {

  const container = document.getElementById("options");

  container.innerHTML = "";

  if (!options || options.length === 0) return;

  options.forEach(opt => {

    const btn = document.createElement("button");

    btn.className = "option-btn";

    btn.innerText = opt.label;

    btn.onclick = () => {

      if (opt.type === "url" && opt.url) {

        container.innerHTML = "";

        window.open(opt.url, "_blank");

        return;
      }

      addMessage(opt.label, "user");

      container.innerHTML = "";

      sendOption(opt.value);
    };

    container.appendChild(btn);
  });

  setTimeout(() => {

    const messages = document.getElementById("messages");

    messages.scrollTo({
      top: messages.scrollHeight,
      behavior: "smooth"
    });

  }, 100);
}

// =====================================
// 🚀 ENVIAR MENSAJE INPUT
// =====================================

async function sendMessage() {

  if (inputLocked) return;

  const input = document.getElementById("input");

  const message = input.value.trim();

  if (!message) return;

  inputLocked = true;

  input.disabled = true;

  addMessage(message, "user");

  input.value = "";

  try{

    const res = await fetch(`${API}/chat`, {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        message,
        leadId,
        conversationId,
        businessId: business._id
      })
    });

    const data = await res.json();

    // 🔥 MOSTRAR ESCRIBIENDO APENAS LLEGA RESPUESTA
    showTyping();

    // 🔥 FORZAR RENDER VISUAL
    await new Promise(resolve =>
      setTimeout(resolve, 50)
    );

    // =====================================
    // 🔥 DELAY REALISTA WHATSAPP
    // =====================================

    await new Promise(resolve =>
      setTimeout(resolve, 3000)
    );

    // 🔥 OCULTAR ESCRIBIENDO
    hideTyping();

    console.log("🔥 CHAT:", data);

    leadId = data.leadId;

    conversationId = data.conversationId;

    addMessage(data.reply, "bot");

    if (data.options) {
      showOptions(data.options);
    }

    if (data.showWhatsApp) {

      const btn = document.getElementById("waBtn");

      btn.style.display = "block";

      whatsappNumber = data.whatsappNumber;
    }

    setInputState(data.showInput, data.inputType);

    if (data.showInput) {

      inputLocked = false;

      input.disabled = false;
    }

  }catch(err){

    hideTyping();

    console.error("❌ SEND ERROR:", err);

    addMessage(
      "❌ Error conectando al backend",
      "bot"
    );
  }
}

// =====================================
// 🚀 ENVIAR OPCIÓN
// =====================================

async function sendOption(value) {

  if (typeof inputLocked !== "undefined") {
    inputLocked = true;
  }

  const input = document.getElementById("input");

  if (input) input.disabled = true;

  try{

    const res = await fetch(`${API}/chat`, {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        message: value,
        leadId,
        conversationId,
        businessId: business._id
      })
    });

    const data = await res.json();

    // 🔥 MOSTRAR ESCRIBIENDO APENAS LLEGA RESPUESTA
    showTyping();

    // 🔥 FORZAR RENDER VISUAL
    await new Promise(resolve =>
      setTimeout(resolve, 50)
    );

    // =====================================
    // 🔥 DELAY REALISTA WHATSAPP
    // =====================================

    await new Promise(resolve =>
      setTimeout(resolve, 3000)
    );

    // 🔥 OCULTAR ESCRIBIENDO
    hideTyping();

    console.log("🔥 OPTION DATA:", data);

    leadId = data.leadId;

    conversationId = data.conversationId;

    addMessage(data.reply, "bot");

    if (data.options) {
      showOptions(data.options);
    }

    if (data.showWhatsApp) {

      const btn = document.getElementById("waBtn");

      btn.style.display = "block";

      whatsappNumber = data.whatsappNumber;
    }

    setInputState(data.showInput, data.inputType);

    if (data.showInput) {

      if (typeof inputLocked !== "undefined") {
        inputLocked = false;
      }

      if (input) {
        input.disabled = false;
      }
    }

  }catch(err){

    hideTyping();

    console.error("❌ OPTION ERROR:", err);

    addMessage(
      "❌ Error conectando al backend",
      "bot"
    );
  }
}

// =====================================
// INPUT STATE
// =====================================

function setInputState(show, type = "text") {

  const inputArea = document.getElementById("input-area");

  const input = document.getElementById("input");

  if (show) {

    inputArea.style.display = "flex";

    if (type === "phone") {

      input.placeholder =
        "Escribe tu número de WhatsApp...";

      input.type = "tel";

    } else if (type === "name") {

      input.placeholder =
        "Escribe tu nombre...";

      input.type = "text";

    } else {

      input.placeholder =
        "Escribe tu mensaje...";

      input.type = "text";
    }

  } else {

    inputArea.style.display = "none";
  }

  setTimeout(() => {

    const messages =
      document.getElementById("messages");

    messages.scrollTo({
      top: messages.scrollHeight,
      behavior: "smooth"
    });

  }, 50);
}

// =====================================
// 📲 CLICK WHATSAPP
// =====================================

document.getElementById("waBtn").onclick = () => {

  let message =
    business?.waMessage ||
    "Hola 👋 quiero más información";

  const product =
    business?.productInfo || "";

  message = message
    .replace("{{product}}", product);

  const text = encodeURIComponent(message);

  const phone =
    business?.whatsappNumber || "";

  window.open(
    `https://wa.me/${phone}?text=${text}`,
    "_blank"
  );
};

// =====================================
// ⌨️ ENTER
// =====================================

document
.getElementById("input")
.addEventListener("keypress", function(e) {

  if (e.key === "Enter") {
    sendMessage();
  }
});

// =====================================
// 🚀 START
// =====================================

loadBusiness();

</script>

</body>
</html>
