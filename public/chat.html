<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

<div class="max-w-2xl mx-auto h-screen flex flex-col">

  <div class="p-4 border-b border-white/10">
    <h1 id="bizName" class="text-2xl font-bold">
      Chat
    </h1>
  </div>

  <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

  <div class="p-4 border-t border-white/10 flex gap-2">

    <input
      id="input"
      class="flex-1 bg-slate-900 p-4 rounded-xl"
      placeholder="Escribe..."
    >

    <button
      onclick="sendMessage()"
      class="bg-blue-600 px-6 rounded-xl"
    >
      Enviar
    </button>

  </div>

</div>

<script>

const API = "https://ai-sales-chat.onrender.com";

const params = new URLSearchParams(window.location.search);

const slug = params.get("slug");

let business = null;
let leadId = null;
let conversationId = null;

// =====================================
// LOAD BUSINESS
// =====================================

async function loadBusiness(){

  try{

    const res = await fetch(`${API}/business/${slug}`);

    business = await res.json();

    document.getElementById("bizName").innerText =
      business.name || "Chat";

  }catch(err){

    console.error(err);

    alert("Negocio no encontrado");
  }
}

loadBusiness();

// =====================================
// SEND MESSAGE
// =====================================

async function sendMessage(){

  const input = document.getElementById("input");

  const message = input.value.trim();

  if(!message) return;

  addMessage(message,"user");

  input.value = "";

  try{

    const res = await fetch(`${API}/chat`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message,
        businessId:business._id,
        leadId,
        conversationId
      })
    });

    const data = await res.json();

    if(data.reply){
      addMessage(data.reply,"bot");
    }

    leadId = data.leadId;
    conversationId = data.conversationId;

  }catch(err){

    console.error(err);
  }
}

// =====================================
// ADD MESSAGE
// =====================================

function addMessage(content,role){

  const messages = document.getElementById("messages");

  const div = document.createElement("div");

  div.className =
    role === "user"
    ? "bg-blue-600 ml-auto p-4 rounded-2xl max-w-[80%]"
    : "bg-white/10 p-4 rounded-2xl max-w-[80%]";

  div.innerText = content;

  messages.appendChild(div);

  messages.scrollTop = messages.scrollHeight;
}

</script>

</body>
</html>
