<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CONTENEDOR */
#chat {
  width: 400px;
  height: 650px;
  background: #fff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

/* HEADER */
#header {
  padding: 15px;
  color: white;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10; /* Asegura que el header siempre esté arriba */
}

#header img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

/* MENSAJES */
#messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  background: #f9fafb;
  display: flex;
  flex-direction: column;
}

.msg {
  max-width: 85%; /* Un poco más ancho para mensajes largos */
  padding: 12px 16px;
  border-radius: 15px;
  margin: 8px 0;
  font-size: 14px;
  line-height: 1.5;
  animation: fadeIn 0.2s ease;
  word-wrap: break-word;
  white-space: pre-line; /* 🔥 CLAVE: Respeta los saltos de línea del bot */
  flex-shrink: 0;
}

.user {
  background: #25D366;
  color: white;
  margin-left: auto;
  border-bottom-right-radius: 5px;
}

.bot {
  background: #e5e7eb;
  color: #111;
  border-bottom-left-radius: 5px;
}

/* INPUT */
#input-area {
  display: none; /* 🔥 OCULTO PARA FORZAR FLUJO CONTROLADO */
  border-top: 1px solid #eee;
}

#input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
}

#sendBtn {
  padding: 0 20px;
  border: none;
  background: #25D366;
  color: white;
  cursor: pointer;
}

/* BOTÓN WHATSAPP */
#waBtn {
  display: none;
  margin: 10px;
  padding: 12px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* 🔥 NUEVO: BOTONES OPCIONES */
#options {
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  background: #f9fafb;
}

.option-btn {
  padding: 10px 14px;
  border: none;
  border-radius: 12px;
  background: #25D366; /* Color verde como en tu imagen */
  color: white;
  cursor: pointer;
  font-weight: 500;
  font-size: 14px;
  animation: fadeIn 0.3s ease;
}

.option-btn:hover {
  filter: brightness(0.9);
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(5px);}
  to {opacity:1; transform: translateY(0);}
}

/* SCROLL */
#messages::-webkit-scrollbar {
  width: 5px;
}
#messages::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="chat">
  <div id="header"></div>

  <div id="messages"></div>

  <div id="options"></div>

  <button id="waBtn">Continuar por WhatsApp</button>

  <div id="input-area">
    <input id="input" placeholder="Escribe tu mensaje..." />
    <button id="sendBtn" onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
let leadId = null;
let conversationId = null;
let business = null;
let whatsappNumber = null;
let inputLocked = false;

const slug = window.location.pathname.substring(1);

async function loadBusiness() {
  const res = await fetch(`/business/${slug}`);

  const data = await res.json();

  business = data; // 🔥 FIX REAL AQUÍ (NO data.business)

  document.getElementById("header").style.background = business.primaryColor;

  document.getElementById("header").innerHTML = `
    <img src="${business.logo}" />
    <div>
      <strong>${business.name}</strong><br/>
      <small>En línea</small>
    </div>
  `;

  addMessage(business.welcomeMessage, "bot");

  setInputState(false);

  setTimeout(() => {
    sendOption("start");
  }, 500);
}
// =========================
// 💬 AGREGAR MENSAJE
// =========================
function addMessage(text, type) {
  const messages = document.getElementById("messages");

  const div = document.createElement("div");
  div.className = "msg " + type;

  // 🔥 DETECTOR DE LINKS (IMÁGENES / VIDEOS / TEXTO)
  const lines = text.split("\n");

  lines.forEach(line => {
    let cleanLine = line.trim();
    if (!cleanLine) return;

    // 🔄 FUNCIÓN RENDERIZADORA DINÁMICA PARA DRIVE
    // Si detecta un link de Drive, lo convierte en una URL que el navegador sí puede leer como imagen
    if (cleanLine.includes("drive.google.com")) {
      const match = cleanLine.match(/\/d\/(.+?)\//) || cleanLine.match(/id=(.+?)(&|$)/);
      if (match && match[1]) {
        const fileId = match[1];
        // Esta URL "bypass" permite que el <img> cargue la foto directamente
        cleanLine = `https://lh3.googleusercontent.com/u/0/d/${fileId}`;
      }
    }

    // 🖼️ IMÁGENES (Detecta extensiones normales O el link de Drive ya procesado)
    if (cleanLine.match(/\.(jpeg|jpg|gif|png|webp)$/i) || cleanLine.includes("googleusercontent.com")) {
      const img = document.createElement("img");
      img.src = cleanLine;
      img.style.maxWidth = "100%";
      img.style.borderRadius = "10px";
      img.style.marginTop = "5px";
      img.style.display = "block";
      
      // Fallback: Si la imagen no carga (por permisos), muestra el link
      img.onerror = function() {
        this.style.display = "none";
        const a = document.createElement("a");
        a.href = line; 
        a.innerText = "Ver testimonio 🔗";
        a.target = "_blank";
        a.style.display = "block";
        a.style.marginTop = "5px";
        a.style.color = "#2563eb";
        a.style.fontWeight = "bold";
        div.appendChild(a);
      };
      
      div.appendChild(img);
    }

    // 🎥 VIDEOS
    else if (cleanLine.match(/\.(mp4|webm|ogg)$/i)) {
      const video = document.createElement("video");
      video.src = cleanLine;
      video.controls = true;
      video.style.maxWidth = "100%";
      video.style.borderRadius = "10px";
      video.style.marginTop = "5px";
      video.style.display = "block";
      div.appendChild(video);
    }

    // 🔗 LINK NORMAL (Google Drive o links sin extensión directa)
    else if (cleanLine.startsWith("http")) {
      const a = document.createElement("a");
      a.href = cleanLine;
      a.innerText = "Ver testimonio 🔗";
      a.target = "_blank";
      a.style.display = "block";
      a.style.marginTop = "5px";
      a.style.color = "#2563eb";
      a.style.fontWeight = "bold";
      div.appendChild(a);
    }

    // 🧾 TEXTO NORMAL
    else {
      const p = document.createElement("div");
      p.innerText = line;
      div.appendChild(p);
    }

  });

  messages.appendChild(div);

  setTimeout(() => {
    messages.scrollTo({
      top: messages.scrollHeight,
      behavior: "smooth"
    });
  }, 50);
}
// =========================
// 🔥 MOSTRAR OPCIONES
// =========================
function showOptions(options) {
  const container = document.getElementById("options");
  container.innerHTML = "";

  if (!options || options.length === 0) return;

  options.forEach(opt => {
    const btn = document.createElement("button");

    btn.className = "option-btn";
    btn.innerText = opt.label;

    btn.onclick = () => {

      // 🔥 CASO ESPECIAL: BOTÓN WHATSAPP (NO PASA POR EL BOT)
      if (opt.type === "url" && opt.url) {

        container.innerHTML = "";

        // ❌ NO SE ENVÍA MENSAJE
        // ❌ NO SE LLAMA sendOption
        // ✅ SOLO ABRE WHATSAPP

        window.open(opt.url, "_blank");

        return;
      }

      // 🔥 FLUJO NORMAL
      addMessage(opt.label, "user");

      container.innerHTML = "";

      sendOption(opt.value);
    };

    container.appendChild(btn);
  });

  setTimeout(() => {
    const messages = document.getElementById("messages");
    messages.scrollTo({
      top: messages.scrollHeight,
      behavior: "smooth"
    });
  }, 100);
}
// =========================
// 🚀 ENVIAR MENSAJE (INPUT)
// =========================
async function sendMessage() {
  if (inputLocked) return; // 🔥 BLOQUEO

  const input = document.getElementById("input");
  const message = input.value.trim();

  if (!message) return;

  inputLocked = true; // 🔥 ACTIVAR BLOQUEO
  input.disabled = true;

  addMessage(message, "user");
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message,
      leadId,
      conversationId,
      businessId: business._id
    })
  });

  let data;
  try {
    data = await res.json();
  } catch (e) {
    console.error("❌ Error parseando respuesta del backend");
    inputLocked = false; // 🔥 DESBLOQUEO EN ERROR
    input.disabled = false;
    return;
  }

  leadId = data.leadId;
  conversationId = data.conversationId;

  // 🔥 ACTUALIZADO: Pasamos data.content para que las imágenes funcionen
  addMessage(data.reply, "bot", data.content);

  if (data.options) {
    showOptions(data.options);
  }

  if (data.showWhatsApp) {
    const btn = document.getElementById("waBtn");
    btn.style.display = "block";
    whatsappNumber = data.whatsappNumber;
  }

  setInputState(data.showInput, data.inputType);

  // 🔥 SOLO DESBLOQUEA SI EL BOT LO PERMITE
  if (data.showInput) {
    inputLocked = false;
    input.disabled = false;
  }
}

// =========================
// 🚀 ENVIAR OPCIÓN (BOTONES)
// =========================
async function sendOption(value) {

  // 🔥 BLOQUEO INPUT
  if (typeof inputLocked !== "undefined") {
    inputLocked = true;
  }

  const input = document.getElementById("input");
  if (input) input.disabled = true;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: value,
      leadId,
      conversationId,
      businessId: business._id
    })
  });

  const data = await res.json();

  leadId = data.leadId;
  conversationId = data.conversationId;

  // 🔥 ACTUALIZADO: Pasamos data.content para que las imágenes funcionen
  addMessage(data.reply, "bot", data.content);

  if (data.options) {
    showOptions(data.options);
  }

  if (data.showWhatsApp) {
    const btn = document.getElementById("waBtn");
    btn.style.display = "block";
    whatsappNumber = data.whatsappNumber;
  }

  setInputState(data.showInput, data.inputType);

  // 🔥 DESBLOQUEAR SOLO SI EL BOT LO PERMITE
  if (data.showInput) {
    if (typeof inputLocked !== "undefined") {
      inputLocked = false;
    }
    if (input) input.disabled = false;
  }
}


function setInputState(show, type = "text") {
  const inputArea = document.getElementById("input-area");
  const input = document.getElementById("input");

  if (show) {
    inputArea.style.display = "flex";

    if (type === "phone") {
      input.placeholder = "Escribe tu número de WhatsApp...";
      input.type = "tel";
    } else if (type === "name") {
      input.placeholder = "Escribe tu nombre...";
      input.type = "text";
    } else {
      input.placeholder = "Escribe tu mensaje...";
      input.type = "text";
    }
  } else {
    inputArea.style.display = "none";
  }
  
  // Re-ajustar scroll al cambiar visibilidad del input
  setTimeout(() => {
    const messages = document.getElementById("messages");
    messages.scrollTo({ top: messages.scrollHeight, behavior: "smooth" });
  }, 50);
}

// =========================
// 📲 CLICK WHATSAPP (AUTO MESSAGE + VARIABLES)
// =========================
document.getElementById("waBtn").onclick = () => {

  // 🔥 mensaje base del negocio
  let message = business?.waMessage || "Hola 👋 quiero más información";

  // 🔥 variables dinámicas del lead (si existen)
  const leadName = window.currentLead?.name || "";
  const product = business?.productInfo || "";

  // 🔥 reemplazos tipo CRM
  message = message
    .replace("{{name}}", leadName)
    .replace("{{product}}", product);

  const text = encodeURIComponent(message);

  // 🔥 FIX CRÍTICO: usar número correcto del business
  const phone = business?.whatsappNumber || "";

  window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
};

// =========================
// ⌨️ ENTER PARA ENVIAR
// =========================
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

// iniciar
loadBusiness();
</script>
</body>
</html>
