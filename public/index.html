<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Sales Chat</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      font-family:'Inter',sans-serif;
    }

    body{
      background:#0f172a;
      overflow-x:hidden;
    }

    .glass{
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .message-user{
      background:linear-gradient(135deg,#3b82f6,#2563eb);
    }

    .message-bot{
      background:rgba(255,255,255,0.08);
    }

    .animate-fade{
      animation:fade .25s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0px);
      }
    }

    .loader{
      width:18px;
      height:18px;
      border:2px solid rgba(255,255,255,0.2);
      border-top:2px solid white;
      border-radius:999px;
      animation:spin .6s linear infinite;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    .sidebar-scroll {
      max-height: calc(100vh - 200px);
      overflow-y: auto;
    }

  </style>
</head>

<body class="text-white min-h-screen">

<div id="app"></div>

<script>

// =========================================
// 🔥 CONFIG
// =========================================

const API = "https://ai-sales-chat.onrender.com";

// =========================================
// 🔥 GLOBAL STATE
// =========================================

let token = localStorage.getItem("token") || null;

let currentBusiness = null;

let leadId = null;

let conversationId = null;

let currentLead = null;

let leads = [];

let conversations = [];

// =========================================
// 🔥 APP
// =========================================

const app = document.getElementById("app");

render();

// =========================================
// 🔥 RENDER
// =========================================

function render(){

  if(!token){
    renderAuth();
    return;
  }

  renderDashboard();
}

// =========================================
// 🔐 AUTH UI
// =========================================

function renderAuth(){

  app.innerHTML = `

  <div class="min-h-screen flex items-center justify-center p-6">

    <div class="glass rounded-3xl p-8 w-full max-w-md">

      <div class="text-center mb-8">

        <h1 class="text-4xl font-black mb-2">
          AI Sales
        </h1>

        <p class="text-slate-300">
          Conectado a Render Backend
        </p>

      </div>

      <div class="space-y-4">

        <input
          id="email"
          type="email"
          placeholder="Email"
          class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
        />

        <input
          id="password"
          type="password"
          placeholder="Contraseña"
          class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
        />

        <button
          onclick="login()"
          class="w-full bg-blue-600 hover:bg-blue-700 transition p-4 rounded-2xl font-bold"
        >
          Iniciar Sesión
        </button>

        <button
          onclick="register()"
          class="w-full bg-emerald-600 hover:bg-emerald-700 transition p-4 rounded-2xl font-bold"
        >
          Crear Cuenta
        </button>

      </div>

    </div>

  </div>

  `;
}

// =========================================
// 🔐 LOGIN
// =========================================

async function login(){

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    return alert("Completa email y contraseña");
  }

  try{

    console.log("🔥 LOGIN START");

    const res = await fetch(`${API}/login`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    });

    console.log("🔥 LOGIN STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 LOGIN RAW:",text);

    let data = {};

    try{
      data = JSON.parse(text);
    }catch(e){

      console.error("❌ RESPUESTA NO JSON");

      alert("El backend respondió HTML o texto.\n\nTu backend está mal configurado.");

      return;
    }

    if(data.error){
      return alert(data.error);
    }

    if(!data.token){
      return alert("No llegó token del backend");
    }

    token = data.token;

    localStorage.setItem("token",token);

    console.log("✅ LOGIN OK");

    render();

  }catch(err){

    console.error("❌ LOGIN ERROR:",err);

    alert("Error login\n\nRevisa consola");
  }
}

// =========================================
// 🔐 REGISTER
// =========================================

async function register(){

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    return alert("Completa email y contraseña");
  }

  try{

    console.log("🔥 REGISTER START");

    const res = await fetch(`${API}/register`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    });

    console.log("🔥 REGISTER STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 REGISTER RAW:",text);

    let data = {};

    try{
      data = JSON.parse(text);
    }catch(e){

      console.error("❌ RESPUESTA REGISTER NO JSON");

      alert("Backend respondió HTML.\n\nEl fallback está rompiendo las APIs.");

      return;
    }

    if(data.error){
      return alert(data.error);
    }

    if(!data.token){
      return alert("No llegó token");
    }

    token = data.token;

    localStorage.setItem("token",token);

    console.log("✅ REGISTER OK");

    render();

  }catch(err){

    console.error("❌ REGISTER ERROR:",err);

    alert("Error registro");
  }
}

// =========================================
// 🔥 OPEN CREATE MODAL
// =========================================

function openCreateBusinessModal(){

  const modal = document.getElementById("createBusinessModal");

  modal.classList.remove("hidden");

  modal.classList.add("flex");
}

// =========================================
// 🔥 CLOSE CREATE MODAL
// =========================================

function closeCreateBusinessModal(){

  const modal = document.getElementById("createBusinessModal");

  modal.classList.add("hidden");

  modal.classList.remove("flex");
}

// =========================================
// 🔥 LOGOUT
// =========================================

function logout(){

  localStorage.removeItem("token");

  token = null;

  currentBusiness = null;

  leadId = null;

  conversationId = null;

  currentLead = null;

  leads = [];

  conversations = [];

  render();
}



// =========================================
// 🏢 CREATE BUSINESS
// =========================================

async function createBusiness(){

  try{

    // =========================================
    // 🔥 CAPTURAR CAMPOS
    // =========================================

    const name =
      document.getElementById("name").value.trim();

    const slug =
      document.getElementById("slug").value.trim();

    const welcomeMessage =
      document.getElementById("welcome").value.trim();

    const productInfo =
      document.getElementById("info").value.trim();

    const productLink =
      document.getElementById("link").value.trim();

    const primaryColor =
      document.getElementById("color").value;

    const waMessage =
      document.getElementById("waMessage").value.trim();

    // =========================================
    // 🔥 WHATSAPP CON PREFIJO PAÍS
    // =========================================

    const countryCode =
      document.getElementById("countryCode").value;

    const phone =
      document.getElementById("wa").value
        .replace(/\D/g,"");

    const whatsappNumber =
      countryCode + phone;

    // =========================================
    // 🔥 LOGO
    // =========================================

    let logo = "";

    const logoPreview =
      document.getElementById("logoPreview");

    if(logoPreview && logoPreview.src){
      logo = logoPreview.src;
    }

    // =========================================
    // 🔥 TESTIMONIOS
    // =========================================

    let testimonials = [];

    const hiddenTestimonials =
      document.getElementById("testimonials").value;

    if(hiddenTestimonials){

      try{

        testimonials = JSON.parse(hiddenTestimonials);

      }catch(e){

        console.error("❌ ERROR TESTIMONIOS:",e);

        testimonials = [];
      }
    }

    // =========================================
    // 🔥 VALIDACIONES
    // =========================================

    if(!name){
      return alert("Falta nombre negocio");
    }

    if(!slug){
      return alert("Falta slug");
    }

    if(!welcomeMessage){
      return alert("Falta mensaje bienvenida");
    }

    if(!productInfo){
      return alert("Falta info producto");
    }

    if(!productLink){
      return alert("Falta link producto");
    }

    if(!whatsappNumber){
      return alert("Falta WhatsApp");
    }

    // =========================================
    // 🔥 PAYLOAD
    // =========================================

    const payload = {

      name,

      slug,

      logo,

      primaryColor,

      welcomeMessage,

      productInfo,

      productLink,

      whatsappNumber,

      waMessage,

      testimonials
    };

    console.log("🔥 PAYLOAD:",payload);

    // =========================================
    // 🔥 REQUEST
    // =========================================

    const res = await fetch(`${API}/business`,{

      method:"POST",

      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },

      body:JSON.stringify(payload)
    });

    console.log("🔥 STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 RAW:",text);

    let data = {};

    try{

      data = JSON.parse(text);

    }catch(err){

      console.error("❌ JSON ERROR:",err);

      return alert("Backend devolvió HTML o texto");
    }

    // =========================================
    // 🔥 ERROR
    // =========================================

    if(data.error){

      return alert(data.error);
    }

    // =========================================
    // 🔥 SUCCESS
    // =========================================

    document.getElementById("createMsg").innerHTML = `
      ✅ Negocio creado:
      <br><br>
      <a
        href="${data.url}"
        target="_blank"
        style="color:#22c55e;font-weight:bold;"
      >
        ${data.url}
      </a>
    `;

    alert("✅ Negocio creado");

    // =========================================
    // 🔥 LIMPIAR FORM
    // =========================================

    document.getElementById("name").value = "";
    document.getElementById("slug").value = "";
    document.getElementById("welcome").value = "";
    document.getElementById("info").value = "";
    document.getElementById("link").value = "";
    document.getElementById("wa").value = "";
    document.getElementById("waMessage").value = "";

    document.getElementById("testimonials").value = "";

    document.getElementById("testimonialsList").innerHTML = "";

    document.getElementById("logoPreview").src = "";

    // =========================================
    // 🔥 RECARGAR NEGOCIOS
    // =========================================

    loadBusinesses();

  }catch(err){

    console.error("❌ CREATE ERROR:",err);

    alert("Error creando negocio");
  }
}

// =========================================
// 🖼 PREVIEW LOGO
// =========================================

function previewLogo(){

  const file =
    document.getElementById("logoFile").files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = e=>{

    document.getElementById("logoPreview").src =
      e.target.result;
  };

  reader.readAsDataURL(file);
}

// =========================================
// ☁️ UPLOAD TESTIMONIALS TO R2
// =========================================

async function uploadToR2(){

  const files =
    document.getElementById("testimonialFile").files;

  if(!files.length) return;

  const list =
    document.getElementById("testimonialsList");

  let testimonials = [];

  try{

    for(const file of files){

      const formData = new FormData();

      formData.append("file",file);

      const res = await fetch(`${API}/upload-testimonial`,{
        method:"POST",
        body:formData
      });

      const data = await res.json();

      console.log("🔥 R2 FILE:",data);

      if(data.url){

        // =========================================
        // 🔥 DETECTAR TYPE
        // =========================================

        let type = "text";

        if(file.type.startsWith("image/")){
          type = "image";
        }

        if(file.type.startsWith("video/")){
          type = "video";
        }

        // =========================================
        // 🔥 PUSH TESTIMONIAL
        // =========================================

        testimonials.push({
          type,
          content:data.url
        });

        // =========================================
        // 🔥 PREVIEW
        // =========================================

        const div = document.createElement("div");

        div.style.width = "80px";
        div.style.height = "80px";
        div.style.borderRadius = "10px";
        div.style.overflow = "hidden";
        div.style.border = "1px solid #333";

        if(type === "image"){

          div.innerHTML = `
            <img
              src="${data.url}"
              style="
                width:100%;
                height:100%;
                object-fit:cover;
              "
            />
          `;
        }

        if(type === "video"){

          div.innerHTML = `
            <video
              src="${data.url}"
              style="
                width:100%;
                height:100%;
                object-fit:cover;
              "
            ></video>
          `;
        }

        list.appendChild(div);
      }
    }

    // =========================================
    // 🔥 GUARDAR EN INPUT HIDDEN
    // =========================================

    document.getElementById("testimonials").value =
      JSON.stringify(testimonials);

    console.log(
      "🔥 TESTIMONIOS:",
      testimonials
    );

  }catch(err){

    console.error("❌ R2 ERROR:",err);

    alert("Error subiendo testimonios");
  }
}



// =========================================
// 📦 LOAD BUSINESSES
// =========================================

async function loadBusinesses(){

  try{

    const res = await fetch(`${API}/my-businesses`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    if(res.status === 401){

      logout();

      return;
    }

    const businesses = await res.json();

    const list = document.getElementById("businessList");

    list.innerHTML = "";

    businesses.forEach(business=>{

      const div = document.createElement("div");

      div.className = "glass rounded-2xl p-4 cursor-pointer hover:scale-[1.02] transition";

      div.innerHTML = `

        <div class="flex items-center justify-between gap-3">

          <div class="flex items-center gap-3">

            ${
              business.logo
              ? `
                <img
                  src="${business.logo}"
                  class="w-14 h-14 rounded-2xl object-cover border border-white/10"
                />
              `
              : `
                <div class="w-14 h-14 rounded-2xl bg-slate-800 flex items-center justify-center text-xl">
                  🏢
                </div>
              `
            }

            <div>

              <h4 class="font-bold">
                ${business.name}
              </h4>

              <p class="text-sm text-slate-400">
                /${business.slug}
              </p>

              <div class="flex items-center gap-2 mt-2 flex-wrap">

                ${
                  business.whatsappNumber
                  ? `
                    <span class="text-[11px] bg-emerald-500/20 text-emerald-300 px-2 py-1 rounded-lg">
                      📲 ${business.whatsappNumber}
                    </span>
                  `
                  : ``
                }

                ${
                  business.primaryColor
                  ? `
                    <div
                      class="w-5 h-5 rounded-full border border-white/20"
                      style="background:${business.primaryColor}"
                    ></div>
                  `
                  : ``
                }

              </div>

            </div>

          </div>

          <div class="flex gap-2">

            <button
              onclick="event.stopPropagation(); deleteBusiness('${business._id}')"
              class="bg-red-500 px-3 py-2 rounded-xl text-xs"
            >
              Eliminar
            </button>

          </div>

        </div>

      `;

      div.onclick = ()=>openBusiness(business);

      list.appendChild(div);
    });

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 🏢 OPEN BUSINESS
// =========================================

async function openBusiness(business){

  currentBusiness = business;

  currentLead = null;

  leadId = null;

  conversationId = null;

  document.getElementById("chatTitle").innerHTML = `

    <div class="w-full">

      <div class="flex items-center justify-between flex-wrap gap-4">

        <div class="flex items-center gap-4">

          ${
            business.logo
            ? `
              <img
                src="${business.logo}"
                class="w-20 h-20 rounded-3xl object-cover border border-white/10"
              />
            `
            : `
              <div class="w-20 h-20 rounded-3xl bg-slate-800 flex items-center justify-center text-4xl">
                🏢
              </div>
            `
          }

          <div>

            <div class="flex items-center gap-3 flex-wrap">

              <span class="text-3xl font-black">
                ${business.name}
              </span>

              <a
                href="https://ai-sales-chat.onrender.com/${business.slug}"
                target="_blank"
                class="text-sm bg-emerald-500 px-3 py-1 rounded-xl"
              >
                Abrir Link
              </a>

            </div>

            <div class="text-sm text-slate-400 mt-2">
              https://ai-sales-chat.onrender.com/${business.slug}
            </div>

            ${
              business.productInfo
              ? `
                <div class="mt-4 text-sm text-slate-300 max-w-3xl whitespace-pre-wrap">
                  ${business.productInfo}
                </div>
              `
              : ``
            }

            <div class="flex flex-wrap gap-2 mt-4">

              ${
                business.whatsappNumber
                ? `
                  <div class="bg-emerald-500/20 text-emerald-300 px-3 py-2 rounded-xl text-sm">
                    📲 ${business.whatsappNumber}
                  </div>
                `
                : ``
              }

              ${
                business.productLink
                ? `
                  <a
                    href="${business.productLink}"
                    target="_blank"
                    class="bg-blue-500/20 text-blue-300 px-3 py-2 rounded-xl text-sm"
                  >
                    🔗 Link de pago
                  </a>
                `
                : ``
              }

              ${
                business.primaryColor
                ? `
                  <div class="flex items-center gap-2 bg-white/5 px-3 py-2 rounded-xl text-sm">
                    <div
                      class="w-4 h-4 rounded-full border border-white/20"
                      style="background:${business.primaryColor}"
                    ></div>
                    Color Principal
                  </div>
                `
                : ``
              }

            </div>

          </div>

        </div>

      </div>

      ${
        business.testimonials && business.testimonials.length
        ? `
          <div class="mt-6">

            <div class="text-sm font-bold text-slate-300 mb-3">
              Testimonios
            </div>

            <div class="flex gap-3 overflow-x-auto pb-2">

              ${business.testimonials.map(item=>{

                if(
                  item.match(/\.(mp4|mov|webm|mkv)$/i)
                ){

                  return `
                    <video
                      src="${item}"
                      controls
                      class="w-48 h-32 object-cover rounded-2xl border border-white/10 bg-black"
                    ></video>
                  `;
                }

                return `
                  <img
                    src="${item}"
                    class="w-48 h-32 object-cover rounded-2xl border border-white/10"
                  />
                `;

              }).join("")}

            </div>

          </div>
        `
        : ``
      }

    </div>

  `;

  document.getElementById("chatMessages").innerHTML = "";

  document.getElementById("dynamicOptions").innerHTML = "";

  await loadAnalytics();

  await loadLeads();
}

// =========================================
// 📊 ANALYTICS
// =========================================

async function loadAnalytics(){

  if(!currentBusiness) return;

  try{

    const res = await fetch(`${API}/analytics/${currentBusiness._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const data = await res.json();

    document.getElementById("analytics").innerHTML = `
      <div class="text-sm text-slate-400">
        Leads
      </div>

      <div class="text-3xl font-black">
        ${data.totalLeads || 0}
      </div>
    `;

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 📥 LOAD LEADS
// =========================================

async function loadLeads(){

  if(!currentBusiness) return;

  try{

    const res = await fetch(`${API}/leads/${currentBusiness._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const data = await res.json();

    leads = data || [];

    renderLeads();

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 👥 RENDER LEADS
// =========================================

function renderLeads(){

  const container = document.getElementById("chatMessages");

  container.innerHTML = "";

  if(!leads.length){

    container.innerHTML = `

      <div class="text-center text-slate-400 mt-20">

        No hay leads todavía

      </div>

    `;

    return;
  }

  leads.forEach(lead=>{

    const div = document.createElement("div");

    div.className = `
      glass
      rounded-3xl
      p-5
      cursor-pointer
      hover:scale-[1.01]
      transition
    `;

    div.innerHTML = `

      <div class="flex items-center justify-between">

        <div>

          <div class="font-bold text-lg">
            ${lead.name || "Lead"}
          </div>

          <div class="text-sm text-slate-400">
            ${lead.phone || ""}
          </div>

        </div>

        <div class="text-right">

          <div class="text-xs text-slate-400">
            Conversación
          </div>

          <div class="font-bold">
            Ver Chat
          </div>

        </div>

      </div>

    `;

    div.onclick = ()=>openLeadConversation(lead);

    container.appendChild(div);
  });
}

// =========================================
// 💬 OPEN LEAD CONVERSATION
// =========================================

async function openLeadConversation(lead){

  currentLead = lead;

  leadId = lead._id;

  conversationId = lead.conversationId;

  document.getElementById("chatMessages").innerHTML = "";

  try{

    const res = await fetch(`${API}/conversation/${lead._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const messages = await res.json();

    messages.forEach(msg=>{

      addMessage(
        msg.content,
        msg.role === "assistant"
          ? "bot"
          : "user"
      );
    });

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 💬 SEND MESSAGE
// =========================================

async function sendMessage(){

  if(!currentLead){
    return alert("Selecciona un lead");
  }

  const input = document.getElementById("messageInput");

  const value = input.value.trim();

  if(!value) return;

  addMessage(value,"user");

  input.value = "";

  await sendCloserMessage(value);
}

// =========================================
// 🤖 SEND CLOSER MESSAGE
// =========================================

async function sendCloserMessage(message){

  try{

    showTyping();

    const res = await fetch(`${API}/closer-message`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },
      body:JSON.stringify({
        businessId:currentBusiness._id,
        leadId,
        conversationId,
        message
      })
    });

    const data = await res.json();

    removeTyping();

    if(data.error){

      addMessage(data.error,"bot");

      return;
    }

    if(data.reply){

      addMessage(data.reply,"bot");
    }

  }catch(err){

    removeTyping();

    console.error(err);

    addMessage(
      "❌ Error enviando mensaje",
      "bot"
    );
  }
}

// =========================================
// 🤖 SEND TO BOT
// =========================================

async function sendToBot(message,hidden=false){

  if(!currentBusiness){
    return alert("Selecciona un negocio");
  }

  try{

    if(!hidden){
      showTyping();
    }

    const res = await fetch(`${API}/chat`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message,
        leadId,
        conversationId,
        businessId:currentBusiness._id
      })
    });

    const data = await res.json();

    removeTyping();

    if(data.error){

      addMessage(data.error,"bot");

      return;
    }

    leadId = data.leadId;

    conversationId = data.conversationId;

    if(data.reply){
      addMessage(data.reply,"bot");
    }

    renderOptions(data.options || []);

    if(data.showWhatsApp){

      addMessage(
        `🔥 WhatsApp listo: ${data.whatsappNumber}`,
        "bot"
      );
    }

  }catch(err){

    removeTyping();

    console.error(err);

    addMessage(
      "❌ Error conectando con Render backend",
      "bot"
    );
  }
}

// =========================================
// 🔥 OPTIONS
// =========================================

function renderOptions(options=[]){

  const container = document.getElementById("dynamicOptions");

  container.innerHTML = "";

  options.forEach(opt=>{

    const btn = document.createElement("button");

    btn.className = "bg-white/10 hover:bg-white/20 transition px-4 py-3 rounded-2xl";

    btn.innerText = opt.label;

    btn.onclick = async ()=>{

      addMessage(opt.label,"user");

      await sendToBot(opt.value,true);
    };

    container.appendChild(btn);
  });
}

// =========================================
// 💬 ADD MESSAGE
// =========================================

function addMessage(content,role){

  const container = document.getElementById("chatMessages");

  const div = document.createElement("div");

  div.className = `
    animate-fade
    max-w-[80%]
    p-5
    rounded-3xl
    whitespace-pre-wrap
    ${
      role === "user"
      ? "message-user ml-auto"
      : "message-bot"
    }
  `;

  if(isMedia(content)){

    if(isImage(content)){

      div.innerHTML = `
        <img
          src="${content}"
          class="rounded-2xl max-w-full mb-2"
        />
      `;
    }

    else if(isVideo(content)){

      div.innerHTML = `
        <video controls class="rounded-2xl max-w-full">
          <source src="${content}">
        </video>
      `;
    }

    else{

      div.innerHTML = `
        <a
          href="${content}"
          target="_blank"
          class="underline text-blue-300"
        >
          Abrir contenido
        </a>
      `;
    }

  }else{

    div.innerText = content;
  }

  container.appendChild(div);

  container.scrollTop = container.scrollHeight;
}

// =========================================
// ⏳ TYPING
// =========================================

function showTyping(){

  const container = document.getElementById("chatMessages");

  const div = document.createElement("div");

  div.id = "typing";

  div.className = "message-bot rounded-3xl p-5 w-fit";

  div.innerHTML = `
    <div class="loader"></div>
  `;

  container.appendChild(div);

  container.scrollTop = container.scrollHeight;
}

function removeTyping(){

  const typing = document.getElementById("typing");

  if(typing){
    typing.remove();
  }
}

// =========================================
// 🗑 DELETE BUSINESS
// =========================================

async function deleteBusiness(id){

  if(!confirm("Eliminar negocio?")) return;

  try{

    await fetch(`${API}/business/${id}`,{
      method:"DELETE",
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    loadBusinesses();

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 📷 MEDIA DETECTORS
// =========================================

function isMedia(text){

  if(!text) return false;

  return text.startsWith("http");
}

function isImage(url){

  return /(jpg|jpeg|png|gif|webp)/i.test(url);
}

function isVideo(url){

  return /(mp4|mov|webm|mkv)/i.test(url);
}

// =========================================
// ⌨ ENTER SEND
// =========================================

document.addEventListener("keydown",e=>{

  if(e.key === "Enter"){

    const active = document.activeElement;

    if(active && active.id === "messageInput"){
      sendMessage();
    }
  }
});

</script>
