// =========================================
// 🔐 LOGIN
// =========================================

async function login(){

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    return alert("Completa email y contraseña");
  }

  try{

    console.log("🔥 LOGIN START");

    const res = await fetch(`${API}/login`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    });

    console.log("🔥 LOGIN STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 LOGIN RAW:",text);

    let data = {};

    try{
      data = JSON.parse(text);
    }catch(e){

      console.error("❌ RESPUESTA NO JSON");

      alert("El backend respondió HTML o texto.\n\nTu backend está mal configurado.");

      return;
    }

    if(data.error){
      return alert(data.error);
    }

    if(!data.token){
      return alert("No llegó token del backend");
    }

    token = data.token;

    localStorage.setItem("token",token);

    console.log("✅ LOGIN OK");

    render();

  }catch(err){

    console.error("❌ LOGIN ERROR:",err);

    alert("Error login\n\nRevisa consola");
  }
}

// =========================================
// 🔐 REGISTER
// =========================================

async function register(){

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    return alert("Completa email y contraseña");
  }

  try{

    console.log("🔥 REGISTER START");

    const res = await fetch(`${API}/register`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    });

    console.log("🔥 REGISTER STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 REGISTER RAW:",text);

    let data = {};

    try{
      data = JSON.parse(text);
    }catch(e){

      console.error("❌ RESPUESTA REGISTER NO JSON");

      alert("Backend respondió HTML.\n\nEl fallback está rompiendo las APIs.");

      return;
    }

    if(data.error){
      return alert(data.error);
    }

    if(!data.token){
      return alert("No llegó token");
    }

    token = data.token;

    localStorage.setItem("token",token);

    console.log("✅ REGISTER OK");

    render();

  }catch(err){

    console.error("❌ REGISTER ERROR:",err);

    alert("Error registro");
  }
}

      document.getElementById("logoPreview");

    if(logoPreview && logoPreview.src){
      logo = logoPreview.src;
    }

    // =========================================
    // 🔥 TESTIMONIOS
    // =========================================

    let testimonials = [];

    const hiddenTestimonials =
      document.getElementById("testimonials")?.value;

    if(hiddenTestimonials){

      try{

        testimonials = JSON.parse(hiddenTestimonials);

      }catch(e){

        console.error("❌ ERROR TESTIMONIOS:",e);

        testimonials = [];
      }
    }

    // =========================================
    // 🔥 VALIDACIONES
    // =========================================

    if(!name){
      return alert("Falta nombre negocio");
    }

    if(!slug){
      return alert("Falta slug");
    }

    if(!welcomeMessage){
      return alert("Falta mensaje bienvenida");
    }

    if(!productInfo){
      return alert("Falta info producto");
    }

    if(!productLink){
      return alert("Falta link producto");
    }

    if(!whatsappNumber){
      return alert("Falta WhatsApp");
    }

    // =========================================
    // 🔥 PAYLOAD
    // =========================================

    const payload = {

      name,

      slug,

      logo,

      primaryColor,

      welcomeMessage,

      productInfo,

      productLink,

      whatsappNumber,

      waMessage,

      testimonials
    };

    console.log("🔥 PAYLOAD:",payload);

    // =========================================
    // 🔥 REQUEST
    // =========================================

    const res = await fetch(`${API}/business`,{

      method:"POST",

      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },

      body:JSON.stringify(payload)
    });

    console.log("🔥 STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 RAW:",text);

    let data = {};

    try{

      data = JSON.parse(text);

    }catch(err){

      console.error("❌ JSON ERROR:",err);

      return alert("Backend devolvió HTML o texto");
    }

    // =========================================
    // 🔥 ERROR
    // =========================================

    if(data.error){
      return alert(data.error);
    }

    // =========================================
    // 🔥 SUCCESS
    // =========================================

    const createMsgEl = document.getElementById("createMsg");

    if(createMsgEl){
      createMsgEl.innerHTML = `
        ✅ Negocio creado:
        <br><br>
        <a
          href="${data.url}"
          target="_blank"
          style="color:#22c55e;font-weight:bold;"
        >
          ${data.url}
        </a>
      `;
    }

    alert("✅ Negocio creado");

    // =========================================
    // 🔥 LIMPIAR FORM
    // =========================================

    const bizNameEl = document.getElementById("bizName");
    const bizSlugEl = document.getElementById("bizSlug");
    const welcomeEl = document.getElementById("welcomeMessage");
    const infoEl = document.getElementById("productInfo");
    const linkEl = document.getElementById("productLink");
    const waEl = document.getElementById("whatsappNumber");
    const waMsgEl = document.getElementById("waMessage");
    const logoEl = document.getElementById("logoPreview");
    const testimonialsEl = document.getElementById("testimonials");
    const testimonialsListEl = document.getElementById("testimonialsList");

    if(bizNameEl) bizNameEl.value = "";
    if(bizSlugEl) bizSlugEl.value = "";
    if(welcomeEl) welcomeEl.value = "";
    if(infoEl) infoEl.value = "";
    if(linkEl) linkEl.value = "";
    if(waEl) waEl.value = "";
    if(waMsgEl) waMsgEl.value = "";

    if(testimonialsEl) testimonialsEl.value = "";

    if(testimonialsListEl) testimonialsListEl.innerHTML = "";

    if(logoEl) logoEl.src = "";

    // =========================================
    // 🔥 RECARGAR NEGOCIOS
    // =========================================

    loadBusinesses();

  }catch(err){

    console.error("❌ CREATE ERROR:",err);

    alert("Error creando negocio");
  }
}

// =========================================
// 🖼 PREVIEW LOGO
// =========================================

function previewLogo(){

  const file =
    document.getElementById("logoFile").files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = e=>{

    document.getElementById("logoPreview").src =
      e.target.result;
  };

  reader.readAsDataURL(file);
}

// =========================================
// ☁️ UPLOAD TESTIMONIALS TO R2
// =========================================

async function uploadToR2(){

  const files =
    document.getElementById("testimonialFile").files;

  if(!files.length) return;

  const list =
    document.getElementById("testimonialsList");

  let testimonials = [];

  try{

    for(const file of files){

      const formData = new FormData();

      formData.append("file",file);

      const res = await fetch(`${API}/upload-testimonial`,{
        method:"POST",
        body:formData
      });

      const data = await res.json();

      console.log("🔥 R2 FILE:",data);

      if(data.url){

        // =========================================
        // 🔥 DETECTAR TYPE
        // =========================================

        let type = "text";

        if(file.type.startsWith("image/")){
          type = "image";
        }

        if(file.type.startsWith("video/")){
          type = "video";
        }

        // =========================================
        // 🔥 PUSH TESTIMONIAL
        // =========================================

        testimonials.push({
          type,
          content:data.url
        });

        // =========================================
        // 🔥 PREVIEW
        // =========================================

        const div = document.createElement("div");

        div.style.width = "80px";
        div.style.height = "80px";
        div.style.borderRadius = "10px";
        div.style.overflow = "hidden";
        div.style.border = "1px solid #333";

        if(type === "image"){

          div.innerHTML = `
            <img
              src="${data.url}"
              style="
                width:100%;
                height:100%;
                object-fit:cover;
              "
            />
          `;
        }

        if(type === "video"){

          div.innerHTML = `
            <video
              src="${data.url}"
              style="
                width:100%;
                height:100%;
                object-fit:cover;
              "
            ></video>
          `;
        }

        list.appendChild(div);
      }
    }

    // =========================================
    // 🔥 GUARDAR EN INPUT HIDDEN
    // =========================================

    document.getElementById("testimonials").value =
      JSON.stringify(testimonials);

    console.log(
      "🔥 TESTIMONIOS:",
      testimonials
    );

  }catch(err){

    console.error("❌ R2 ERROR:",err);

    alert("Error subiendo testimonios");
  }
}

// =========================================
// 📊 ANALYTICS
// =========================================

async function loadAnalytics(){

  if(!currentBusiness) return;

    const res = await fetch(`${API}/analytics/${currentBusiness._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

      <div class="text-sm text-slate-400">
        Leads
      </div>

}

// =========================================
// 📥 LOAD LEADS
// =========================================

async function loadLeads(){

  if(!currentBusiness) return;

  try{

    const res = await fetch(`${API}/leads/${currentBusiness._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

// =========================================
// 👥 RENDER LEADS
// =========================================

// =========================================
// 💬 OPEN LEAD CONVERSATION
// =========================================

async function openLeadConversation(lead){

  currentLead = lead;

  leadId = lead._id;

  conversationId = lead.conversationId;

  document.getElementById("chatMessages").innerHTML = "";

  try{

    const res = await fetch(`${API}/conversation/${lead._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const messages = await res.json();

    messages.forEach(msg=>{

      addMessage(
        msg.content,
        msg.role === "assistant"
          ? "bot"
          : "user"
      );
    });

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 💬 SEND MESSAGE
// =========================================

async function sendMessage(){

  if(!currentLead){
    return alert("Selecciona un lead");
  }

  const input = document.getElementById("messageInput");

  const value = input.value.trim();

  if(!value) return;

  addMessage(value,"user");

  input.value = "";

  await sendCloserMessage(value);
}

// =========================================
// 🤖 SEND CLOSER MESSAGE
// =========================================

async function sendCloserMessage(message){

  try{

    showTyping();

    const res = await fetch(`${API}/closer-message`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },
      body:JSON.stringify({
        businessId:currentBusiness._id,
        leadId,
        conversationId,
        message
      })
    });

    const data = await res.json();

    removeTyping();

    if(data.error){

      addMessage(data.error,"bot");

      return;
    }

    if(data.reply){

      addMessage(data.reply,"bot");
    }

  }catch(err){

    removeTyping();

    console.error(err);

    addMessage(
      "❌ Error enviando mensaje",
      "bot"
    );
  }
}

// =========================================
// 🤖 SEND TO BOT
// =========================================

async function sendToBot(message,hidden=false){

  if(!currentBusiness){
    return alert("Selecciona un negocio");
  }

  try{

    if(!hidden){
      showTyping();
    }

    const res = await fetch(`${API}/chat`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message,
        leadId,
        conversationId,
        businessId:currentBusiness._id
      })
    });

    const data = await res.json();

    removeTyping();

    if(data.error){

      addMessage(data.error,"bot");

      return;
    }

    leadId = data.leadId;

    conversationId = data.conversationId;

    if(data.reply){
      addMessage(data.reply,"bot");
    }

    renderOptions(data.options || []);

    if(data.showWhatsApp){

      addMessage(
        `🔥 WhatsApp listo: ${data.whatsappNumber}`,
        "bot"
      );
    }

  }catch(err){

    removeTyping();

    console.error(err);

    addMessage(
      "❌ Error conectando con Render backend",
      "bot"
    );
  }
}

// =========================================
// 🔥 OPTIONS
// =========================================

function renderOptions(options=[]){

  const container = document.getElementById("dynamicOptions");

  container.innerHTML = "";

  options.forEach(opt=>{

    const btn = document.createElement("button");

    btn.className = "bg-white/10 hover:bg-white/20 transition px-4 py-3 rounded-2xl";

    btn.innerText = opt.label;

    btn.onclick = async ()=>{

      addMessage(opt.label,"user");

      await sendToBot(opt.value,true);
    };

    container.appendChild(btn);
  });
}

// =========================================
// 💬 ADD MESSAGE
// =========================================

function addMessage(content,role){

  const container = document.getElementById("chatMessages");

  const div = document.createElement("div");

  div.className = `
    animate-fade
    max-w-[80%]
    p-5
    rounded-3xl
    whitespace-pre-wrap
    ${
      role === "user"
      ? "message-user ml-auto"
      : "message-bot"
    }
  `;

  if(isMedia(content)){

    if(isImage(content)){

      div.innerHTML = `
        <img
          src="${content}"
          class="rounded-2xl max-w-full mb-2"
        />
      `;
    }

    else if(isVideo(content)){

      div.innerHTML = `
        <video controls class="rounded-2xl max-w-full">
          <source src="${content}">
        </video>
      `;
    }

    else{

      div.innerHTML = `
        <a
          href="${content}"
          target="_blank"
          class="underline text-blue-300"
        >
          Abrir contenido
        </a>
      `;
    }

  }else{

    div.innerText = content;
  }

  container.appendChild(div);

  container.scrollTop = container.scrollHeight;
}

// =========================================
// ⏳ TYPING
// =========================================

function showTyping(){

  const container = document.getElementById("chatMessages");

  const div = document.createElement("div");

  div.id = "typing";

  div.className = "message-bot rounded-3xl p-5 w-fit";

  div.innerHTML = `
    <div class="loader"></div>
  `;

  container.appendChild(div);

  container.scrollTop = container.scrollHeight;
}

function removeTyping(){

  const typing = document.getElementById("typing");

  if(typing){
    typing.remove();
  }
}

// =========================================
// 🗑 DELETE BUSINESS
// =========================================

async function deleteBusiness(id){

  if(!confirm("Eliminar negocio?")) return;

  try{

    await fetch(`${API}/business/${id}`,{
      method:"DELETE",
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    loadBusinesses();

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 📷 MEDIA DETECTORS
// =========================================

function isMedia(text){

  if(!text) return false;

  return text.startsWith("http");
}

function isImage(url){

  return /(jpg|jpeg|png|gif|webp)/i.test(url);
}

function isVideo(url){

  return /(mp4|mov|webm|mkv)/i.test(url);
}

// =========================================
// ⌨ ENTER SEND
// =========================================

document.addEventListener("keydown",e=>{

  if(e.key === "Enter"){

    const active = document.activeElement;

    if(active && active.id === "messageInput"){
      sendMessage();
    }
  }
});
