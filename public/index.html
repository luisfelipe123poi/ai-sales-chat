<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Sales Chat</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      font-family:'Inter',sans-serif;
    }

    body{
      background:#0f172a;
      overflow-x:hidden;
    }

    .glass{
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .message-user{
      background:linear-gradient(135deg,#3b82f6,#2563eb);
    }

    .message-bot{
      background:rgba(255,255,255,0.08);
    }

    .animate-fade{
      animation:fade .25s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0px);
      }
    }

    .loader{
      width:18px;
      height:18px;
      border:2px solid rgba(255,255,255,0.2);
      border-top:2px solid white;
      border-radius:999px;
      animation:spin .6s linear infinite;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

  </style>
</head>

<body class="text-white min-h-screen">

<div id="app"></div>

<script>

// =========================================
// 🔥 CONFIG
// =========================================

const API = "https://ai-sales-chat.onrender.com";

// =========================================
// 🔥 GLOBAL STATE
// =========================================

let token = localStorage.getItem("token") || null;

let currentBusiness = null;

let leadId = null;

let conversationId = null;

let currentLead = null;

let leads = [];

let conversations = [];

// =========================================
// 🔥 APP
// =========================================

const app = document.getElementById("app");

render();

// =========================================
// 🔥 RENDER
// =========================================

function render(){

  if(!token){
    renderAuth();
    return;
  }

  renderDashboard();
}

// =========================================
// 🔐 AUTH UI
// =========================================

function renderAuth(){

  app.innerHTML = `

  <div class="min-h-screen flex items-center justify-center p-6">

    <div class="glass rounded-3xl p-8 w-full max-w-md">

      <div class="text-center mb-8">

        <h1 class="text-4xl font-black mb-2">
          AI Sales
        </h1>

        <p class="text-slate-300">
          Conectado a Render Backend
        </p>

      </div>

      <div class="space-y-4">

        <input
          id="email"
          type="email"
          placeholder="Email"
          class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
        />

        <input
          id="password"
          type="password"
          placeholder="Contraseña"
          class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
        />

        <button
          onclick="login()"
          class="w-full bg-blue-600 hover:bg-blue-700 transition p-4 rounded-2xl font-bold"
        >
          Iniciar Sesión
        </button>

        <button
          onclick="register()"
          class="w-full bg-emerald-600 hover:bg-emerald-700 transition p-4 rounded-2xl font-bold"
        >
          Crear Cuenta
        </button>

      </div>

    </div>

  </div>

  `;
}

// =========================================
// 🔐 LOGIN
// =========================================

async function login(){

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    return alert("Completa email y contraseña");
  }

  try{

    console.log("🔥 LOGIN START");

    const res = await fetch(`${API}/login`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    });

    console.log("🔥 LOGIN STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 LOGIN RAW:",text);

    let data = {};

    try{
      data = JSON.parse(text);
    }catch(e){

      console.error("❌ RESPUESTA NO JSON");

      alert("El backend respondió HTML o texto.\n\nTu backend está mal configurado.");

      return;
    }

    if(data.error){
      return alert(data.error);
    }

    if(!data.token){
      return alert("No llegó token del backend");
    }

    token = data.token;

    localStorage.setItem("token",token);

    console.log("✅ LOGIN OK");

    render();

  }catch(err){

    console.error("❌ LOGIN ERROR:",err);

    alert("Error login\n\nRevisa consola");
  }
}

// =========================================
// 🔐 REGISTER
// =========================================

async function register(){

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    return alert("Completa email y contraseña");
  }

  try{

    console.log("🔥 REGISTER START");

    const res = await fetch(`${API}/register`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    });

    console.log("🔥 REGISTER STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 REGISTER RAW:",text);

    let data = {};

    try{
      data = JSON.parse(text);
    }catch(e){

      console.error("❌ RESPUESTA REGISTER NO JSON");

      alert("Backend respondió HTML.\n\nEl fallback está rompiendo las APIs.");

      return;
    }

    if(data.error){
      return alert(data.error);
    }

    if(!data.token){
      return alert("No llegó token");
    }

    token = data.token;

    localStorage.setItem("token",token);

    console.log("✅ REGISTER OK");

    render();

  }catch(err){

    console.error("❌ REGISTER ERROR:",err);

    alert("Error registro");
  }
}

// =========================================
// 🏢 DASHBOARD
// =========================================

async function renderDashboard(){

  app.innerHTML = `

  <div class="flex min-h-screen">

    <aside class="w-[320px] glass border-r border-white/10 p-6 overflow-y-auto">

      <div class="flex items-center justify-between mb-8">

        <div>

          <h2 class="text-2xl font-black">
            Negocios
          </h2>

          <p class="text-slate-400 text-sm">
            Backend Render
          </p>

        </div>

        <button
          onclick="logout()"
          class="bg-red-500 px-4 py-2 rounded-xl text-sm font-bold"
        >
          Salir
        </button>

      </div>

      <div class="space-y-3 mb-8">

        <input
          id="bizName"
          placeholder="Nombre negocio"
          class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700"
        />

        <input
          id="bizSlug"
          placeholder="Slug"
          class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700"
        />

        <textarea
          id="welcomeMessage"
          placeholder="Mensaje bienvenida"
          class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 h-24"
        ></textarea>

        <textarea
          id="productInfo"
          placeholder="Producto"
          class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 h-24"
        ></textarea>

        <input
          id="productLink"
          placeholder="Link producto"
          class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700"
        />

        <input
          id="whatsappNumber"
          placeholder="WhatsApp"
          class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700"
        />

        <button
          onclick="createBusiness()"
          class="w-full bg-emerald-500 hover:bg-emerald-600 p-4 rounded-2xl font-bold"
        >
          Crear Negocio
        </button>

      </div>

      <div>

        <h3 class="font-bold mb-4">
          Mis negocios
        </h3>

        <div id="businessList" class="space-y-3"></div>

      </div>

    </aside>

    <main class="flex-1 flex flex-col">

      <div class="p-6 border-b border-white/10 flex items-center justify-between">

        <div>

          <h1 id="chatTitle" class="text-3xl font-black">
            Selecciona negocio
          </h1>

          <p class="text-slate-400">
            Chat conectado a tu backend
          </p>

        </div>

        <div id="analytics" class="text-right"></div>

      </div>

      <div
        id="chatMessages"
        class="flex-1 overflow-y-auto p-6 space-y-4"
      ></div>

      <div class="border-t border-white/10 p-6">

        <div
          id="dynamicOptions"
          class="flex flex-wrap gap-2 mb-4"
        ></div>

        <div class="flex gap-3">

          <input
            id="messageInput"
            placeholder="Responder al lead..."
            class="flex-1 p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none"
          />

          <button
            onclick="sendMessage()"
            class="bg-blue-600 hover:bg-blue-700 transition px-8 rounded-2xl font-bold"
          >
            Enviar
          </button>

        </div>

      </div>

    </main>

  </div>

  `;

  loadBusinesses();
}

// =========================================
// 🔥 LOGOUT
// =========================================

function logout(){

  localStorage.removeItem("token");

  token = null;

  currentBusiness = null;

  leadId = null;

  conversationId = null;

  currentLead = null;

  leads = [];

  conversations = [];

  render();
}

// =========================================
// 🏢 CREATE BUSINESS
// =========================================

async function createBusiness(){

  try{

    const payload = {

      name:document.getElementById("bizName").value,

      slug:document.getElementById("bizSlug").value,

      welcomeMessage:document.getElementById("welcomeMessage").value,

      productInfo:document.getElementById("productInfo").value,

      productLink:document.getElementById("productLink").value,

      whatsappNumber:document.getElementById("whatsappNumber").value,

      primaryColor:"#3b82f6",

      logo:"",

      testimonials:[]
    };

    const res = await fetch(`${API}/business`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },
      body:JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.error){
      return alert(data.error);
    }

    alert("Negocio creado");

    loadBusinesses();

  }catch(err){

    console.error(err);

    alert("Error creando negocio");
  }
}

// =========================================
// 📦 LOAD BUSINESSES
// =========================================

async function loadBusinesses(){

  try{

    const res = await fetch(`${API}/my-businesses`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    if(res.status === 401){

      logout();

      return;
    }

    const businesses = await res.json();

    const list = document.getElementById("businessList");

    list.innerHTML = "";

    businesses.forEach(business=>{

      const div = document.createElement("div");

      div.className = "glass rounded-2xl p-4 cursor-pointer hover:scale-[1.02] transition";

      div.innerHTML = `

        <div class="flex items-center justify-between gap-3">

          <div>

            <h4 class="font-bold">
              ${business.name}
            </h4>

            <p class="text-sm text-slate-400">
              /${business.slug}
            </p>

          </div>

          <div class="flex gap-2">

            <button
              onclick="event.stopPropagation(); deleteBusiness('${business._id}')"
              class="bg-red-500 px-3 py-2 rounded-xl text-xs"
            >
              Eliminar
            </button>

          </div>

        </div>

      `;

      div.onclick = ()=>openBusiness(business);

      list.appendChild(div);
    });

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 🏢 OPEN BUSINESS
// =========================================

async function openBusiness(business){

  currentBusiness = business;

  currentLead = null;

  leadId = null;

  conversationId = null;

  document.getElementById("chatTitle").innerHTML = `

    <div>

      <div class="flex items-center gap-3">

        <span>${business.name}</span>

        <a
          href="https://ai-sales-chat.onrender.com/${business.slug}"
          target="_blank"
          class="text-sm bg-emerald-500 px-3 py-1 rounded-xl"
        >
          Abrir Link
        </a>

      </div>

      <div class="text-sm text-slate-400 mt-2">
        https://ai-sales-chat.onrender.com/${business.slug}
      </div>

    </div>

  `;

  document.getElementById("chatMessages").innerHTML = "";

  document.getElementById("dynamicOptions").innerHTML = "";

  await loadAnalytics();

  await loadLeads();
}

// =========================================
// 📊 ANALYTICS
// =========================================

async function loadAnalytics(){

  if(!currentBusiness) return;

  try{

    const res = await fetch(`${API}/analytics/${currentBusiness._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const data = await res.json();

    document.getElementById("analytics").innerHTML = `
      <div class="text-sm text-slate-400">
        Leads
      </div>

      <div class="text-3xl font-black">
        ${data.totalLeads || 0}
      </div>
    `;

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 📥 LOAD LEADS
// =========================================

async function loadLeads(){

  if(!currentBusiness) return;

  try{

    const res = await fetch(`${API}/leads/${currentBusiness._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const data = await res.json();

    leads = data || [];

    renderLeads();

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 👥 RENDER LEADS
// =========================================

function renderLeads(){

  const container = document.getElementById("chatMessages");

  container.innerHTML = "";

  if(!leads.length){

    container.innerHTML = `

      <div class="text-center text-slate-400 mt-20">

        No hay leads todavía

      </div>

    `;

    return;
  }

  leads.forEach(lead=>{

    const div = document.createElement("div");

    div.className = `
      glass
      rounded-3xl
      p-5
      cursor-pointer
      hover:scale-[1.01]
      transition
    `;

    div.innerHTML = `

      <div class="flex items-center justify-between">

        <div>

          <div class="font-bold text-lg">
            ${lead.name || "Lead"}
          </div>

          <div class="text-sm text-slate-400">
            ${lead.phone || ""}
          </div>

        </div>

        <div class="text-right">

          <div class="text-xs text-slate-400">
            Conversación
          </div>

          <div class="font-bold">
            Ver Chat
          </div>

        </div>

      </div>

    `;

    div.onclick = ()=>openLeadConversation(lead);

    container.appendChild(div);
  });
}

// =========================================
// 💬 OPEN LEAD CONVERSATION
// =========================================

async function openLeadConversation(lead){

  currentLead = lead;

  leadId = lead._id;

  conversationId = lead.conversationId;

  document.getElementById("chatMessages").innerHTML = "";

  try{

    const res = await fetch(`${API}/conversation/${lead._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const messages = await res.json();

    messages.forEach(msg=>{

      addMessage(
        msg.content,
        msg.role === "assistant"
          ? "bot"
          : "user"
      );
    });

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 💬 SEND MESSAGE
// =========================================

async function sendMessage(){

  if(!currentLead){
    return alert("Selecciona un lead");
  }

  const input = document.getElementById("messageInput");

  const value = input.value.trim();

  if(!value) return;

  addMessage(value,"user");

  input.value = "";

  await sendCloserMessage(value);
}

// =========================================
// 🤖 SEND CLOSER MESSAGE
// =========================================

async function sendCloserMessage(message){

  try{

    showTyping();

    const res = await fetch(`${API}/closer-message`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },
      body:JSON.stringify({
        businessId:currentBusiness._id,
        leadId,
        conversationId,
        message
      })
    });

    const data = await res.json();

    removeTyping();

    if(data.error){

      addMessage(data.error,"bot");

      return;
    }

    if(data.reply){

      addMessage(data.reply,"bot");
    }

  }catch(err){

    removeTyping();

    console.error(err);

    addMessage(
      "❌ Error enviando mensaje",
      "bot"
    );
  }
}

// =========================================
// 🤖 SEND TO BOT
// =========================================

async function sendToBot(message,hidden=false){

  if(!currentBusiness){
    return alert("Selecciona un negocio");
  }

  try{

    if(!hidden){
      showTyping();
    }

    const res = await fetch(`${API}/chat`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message,
        leadId,
        conversationId,
        businessId:currentBusiness._id
      })
    });

    const data = await res.json();

    removeTyping();

    if(data.error){

      addMessage(data.error,"bot");

      return;
    }

    leadId = data.leadId;

    conversationId = data.conversationId;

    if(data.reply){
      addMessage(data.reply,"bot");
    }

    renderOptions(data.options || []);

    if(data.showWhatsApp){

      addMessage(
        `🔥 WhatsApp listo: ${data.whatsappNumber}`,
        "bot"
      );
    }

  }catch(err){

    removeTyping();

    console.error(err);

    addMessage(
      "❌ Error conectando con Render backend",
      "bot"
    );
  }
}

// =========================================
// 🔥 OPTIONS
// =========================================

function renderOptions(options=[]){

  const container = document.getElementById("dynamicOptions");

  container.innerHTML = "";

  options.forEach(opt=>{

    const btn = document.createElement("button");

    btn.className = "bg-white/10 hover:bg-white/20 transition px-4 py-3 rounded-2xl";

    btn.innerText = opt.label;

    btn.onclick = async ()=>{

      addMessage(opt.label,"user");

      await sendToBot(opt.value,true);
    };

    container.appendChild(btn);
  });
}

// =========================================
// 💬 ADD MESSAGE
// =========================================

function addMessage(content,role){

  const container = document.getElementById("chatMessages");

  const div = document.createElement("div");

  div.className = `
    animate-fade
    max-w-[80%]
    p-5
    rounded-3xl
    whitespace-pre-wrap
    ${
      role === "user"
      ? "message-user ml-auto"
      : "message-bot"
    }
  `;

  if(isMedia(content)){

    if(isImage(content)){

      div.innerHTML = `
        <img
          src="${content}"
          class="rounded-2xl max-w-full mb-2"
        />
      `;
    }

    else if(isVideo(content)){

      div.innerHTML = `
        <video controls class="rounded-2xl max-w-full">
          <source src="${content}">
        </video>
      `;
    }

    else{

      div.innerHTML = `
        <a
          href="${content}"
          target="_blank"
          class="underline text-blue-300"
        >
          Abrir contenido
        </a>
      `;
    }

  }else{

    div.innerText = content;
  }

  container.appendChild(div);

  container.scrollTop = container.scrollHeight;
}

// =========================================
// ⏳ TYPING
// =========================================

function showTyping(){

  const container = document.getElementById("chatMessages");

  const div = document.createElement("div");

  div.id = "typing";

  div.className = "message-bot rounded-3xl p-5 w-fit";

  div.innerHTML = `
    <div class="loader"></div>
  `;

  container.appendChild(div);

  container.scrollTop = container.scrollHeight;
}

function removeTyping(){

  const typing = document.getElementById("typing");

  if(typing){
    typing.remove();
  }
}

// =========================================
// 🗑 DELETE BUSINESS
// =========================================

async function deleteBusiness(id){

  if(!confirm("Eliminar negocio?")) return;

  try{

    await fetch(`${API}/business/${id}`,{
      method:"DELETE",
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    loadBusinesses();

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 📷 MEDIA DETECTORS
// =========================================

function isMedia(text){

  if(!text) return false;

  return text.startsWith("http");
}

function isImage(url){

  return /(jpg|jpeg|png|gif|webp)/i.test(url);
}

function isVideo(url){

  return /(mp4|mov|webm|mkv)/i.test(url);
}

// =========================================
// ⌨ ENTER SEND
// =========================================

document.addEventListener("keydown",e=>{

  if(e.key === "Enter"){

    const active = document.activeElement;

    if(active && active.id === "messageInput"){
      sendMessage();
    }
  }
});

</script>

</body>
</html>
