// 📸 PROCESADOR DE IMÁGENES A BASE64 (Ámbito Global)
// =========================================
window.convertirImagenABase64 = function(input, itemID) {
  const file = input.files[0];
  const label = document.getElementById(`label_${itemID}`);
  const base64Input = document.getElementById(`base64_${itemID}`);
  const preview = document.getElementById(`preview_${itemID}`);
  const placeholder = document.getElementById(`placeholder_${itemID}`);

  if (file) {
    // Validar que no supere los 2MB para no sobrecargar el payload del servidor
    if (file.size > 2 * 1024 * 1024) {
      alert("La imagen es demasiado pesada. Elige una de menos de 2MB.");
      input.value = "";
      return;
    }

    const reader = new FileReader();
    reader.onload = function (e) {
      const base64String = e.target.result;
      
      // Guardar el string Base64 en el input oculto que createBusiness va a escanear
      if (base64Input) {
        base64Input.value = base64String;
      }
      
      // Actualizar la interfaz visual
      if (label) {
        label.innerText = file.name.length > 18 ? file.name.substring(0, 15) + "..." : file.name;
      }
      if (preview) {
        preview.src = base64String;
        preview.classList.remove("hidden");
      }
      if (placeholder) {
        placeholder.classList.add("hidden");
      }
    };
    
    reader.onerror = function(err) {
      console.error("❌ Error al leer el archivo:", err);
    };

    reader.readAsDataURL(file);
  }
};

let editor;

// Modifica o añade a tu función existente que abre el modal para inicializar Drawflow una sola vez
const _oldOpenCreateBusinessModal = window.openCreateBusinessModal;
window.openCreateBusinessModal = function() {
  if (typeof _oldOpenCreateBusinessModal === 'function') _oldOpenCreateBusinessModal();
  
  // Inicializar Drawflow si no se ha creado
  setTimeout(() => {
    const container = document.getElementById('drawflow');
    if (container && !editor) {
      editor = new Drawflow(container);
      editor.start();

      addNodeToCanvas('message', 'start');
    }

};

// 🔥 FUNCIÓN QUE RESUELVE TU ERROR (Estructura original intacta)
function addNodeToCanvas(type, customId = null) {
  if (!editor) return;

  const id = customId || 'node_' + Date.now();
  let htmlContent = '';
  
  // Determinamos las salidas iniciales. El nodo 'start' o mensajes base inician con 1 salida por defecto
  let outputsCount = 0;

  if (type === 'message') {
    htmlContent = `
      <div class="p-2 bg-slate-900/90 rounded-xl border border-indigo-500/30" data-node-id="${id}">
        <div class="text-xs font-bold text-indigo-400 mb-1 flex justify-between items-center">
          <span>💬 Bloque Mensaje / Pregunta</span>
          <button type="button" class="btn-delete-node text-red-400 hover:text-red-300 font-bold px-1">✕</button>
        </div>
        <textarea placeholder="Escribe el mensaje o pregunta del bot..." class="node-content w-full bg-slate-950 border border-slate-800 rounded-lg p-1.5 text-xs text-white resize-none focus:border-indigo-500 outline-none" rows="2"></textarea>
        
        <div class="mt-2 pt-2 border-t border-slate-800/60">
          <div class="text-[10px] font-bold text-slate-400 mb-1">🎛️ Botones Opciones de Respuesta:</div>
          <div class="options-container space-y-1">
            </div>
          <button type="button" class="btn-add-option w-full mt-1.5 bg-indigo-950/60 hover:bg-indigo-900 border border-indigo-500/40 text-[10px] text-indigo-300 py-1 rounded font-medium transition">
            ➕ Añadir Botón de Opción
          </button>
        </div>
      </div>
    `;
  } else if (type === 'input') {
    htmlContent = `
      <div class="p-2 bg-slate-900/90 rounded-xl border border-amber-500/30" data-node-id="${id}">
        <div class="text-xs font-bold text-amber-400 mb-1 flex justify-between items-center">
          <span>📥 Bloque Captura Dato Abierto</span>
          <button type="button" class="btn-delete-node text-red-400 hover:text-red-300 font-bold px-1">✕</button>
        </div>
        <select class="node-input-type w-full bg-slate-950 border border-slate-800 rounded-lg p-1 text-xs text-white mb-2 outline-none">
          <option value="text">Texto Libre (Cualquier Respuesta)</option>
          <option value="name">Capturar Nombre (name)</option>
          <option value="phone">Capturar Teléfono (phone)</option>
        </select>
        <textarea placeholder="Mensaje/Pregunta antes de capturar dato libre..." class="node-content w-full bg-slate-950 border border-slate-800 rounded-lg p-1.5 text-xs text-white resize-none focus:border-amber-500 outline-none" rows="2"></textarea>
      </div>
    `;
  } else if (type === 'whatsapp_trigger') {
    htmlContent = `
      <div class="p-2 bg-slate-900/90 rounded-xl border border-emerald-500/30" data-node-id="${id}">
        <div class="text-xs font-bold text-emerald-400 mb-1 flex justify-between items-center">
          <span>📲 Acción Redirección WhatsApp</span>
          <button type="button" class="btn-delete-node text-red-400 hover:text-red-300 font-bold px-1">✕</button>
        </div>
        <textarea placeholder="Mensaje final de cierre antes de redirigir..." class="node-content w-full bg-slate-950 border border-slate-800 rounded-lg p-1.5 text-xs text-white resize-none focus:border-emerald-500 outline-none" rows="2"></textarea>
      </div>
    `;
    outputsCount = 0; // Final del flujo conversacional físico
  }

  // Posicionamiento escalonado en el lienzo central
  const posX = customId === 'start' ? 50 : 150 + (Math.random() * 100);
  const posY = customId === 'start' ? 150 : 100 + (Math.random() * 100);

  // Agrega el nodo físico con su respectivo número de entradas y salidas iniciales
  // 🔥 CORRECCIÓN: Almacenamos el ID de ejecución secuencial real que genera el motor de Drawflow
  const drawflowId = editor.addNode(id, customId === 'start' ? 0 : 1, outputsCount, posX, posY, type, { type, customId: id }, htmlContent);

  // 🔥 SOLUCIÓN DEL CLICK: Mapeamos los botones usando el ID real indexado en el DOM por Drawflow
  const addedNodeEl = document.getElementById(`node-${drawflowId}`);
  if (addedNodeEl) {
    const btnAdd = addedNodeEl.querySelector('.btn-add-option');
    if (btnAdd) {
      btnAdd.setAttribute('onclick', `addOptionToNode('${drawflowId}')`);
    }
    const btnDel = addedNodeEl.querySelector('.btn-delete-node');
    if (btnDel) {
      btnDel.setAttribute('onclick', `deleteNode('${drawflowId}')`);
    }
  }
}

// 🔥 FUNCIÓN PARA AGREGAR OPCIONES Y CREAR CONECTORES EXTRA (OUTPUTS) DINÁMICAMENTE
function addOptionToNode(nodeId) {
  // Buscar el contenedor del nodo físico en el DOM de Drawflow
  const nodeEl = document.getElementById(`node-${nodeId}`);
  if (!nodeEl) return;

  const container = nodeEl.querySelector('.options-container');
  if (!container) return;

  const currentOptions = container.querySelectorAll('.option-item').length;
  const optionIndex = currentOptions + 1;

  // Creamos el Input del botón de respuesta controlada
  const optionDiv = document.createElement('div');
  optionDiv.className = 'option-item flex items-center gap-1';
  optionDiv.innerHTML = `
    <span class="text-[9px] text-slate-500 font-bold min-w-[14px]">#${optionIndex}</span>
    <input type="text" placeholder="Texto del Botón..." class="node-option-text w-full bg-slate-950 border border-slate-800 rounded px-1.5 py-0.5 text-[11px] text-white focus:border-indigo-400 outline-none" />
    <button type="button" onclick="removeOptionFromNode('${nodeId}', this)" class="text-red-500 hover:text-red-400 text-xs px-0.5">✕</button>
  `;
  
  container.appendChild(optionDiv);

  // 🔌 CRÍTICO: Le agregamos una salida (Output conector) extra a la derecha de la cajita en Drawflow
  editor.addNodeOutput(nodeId);
}

// 🔥 FUNCIÓN PARA REMOVER OPCIONES Y RETIRAR EL CONECTOR EXTRA DE DRAWFLOW
function removeOptionFromNode(nodeId, buttonEl) {
  const optionItem = buttonEl.parentElement;
  const container = optionItem.parentElement;
  
  optionItem.remove();

  // Removemos el último conector de salida físico del editor para mantener sincronía
  editor.removeNodeOutput(nodeId, 'output_' + (container.querySelectorAll('.option-item').length + 1));
  
  // Re-indexar los números de las opciones visuales restantes
  container.querySelectorAll('.option-item').forEach((item, idx) => {
    item.querySelector('span').innerText = `#${idx + 1}`;
  });
}

// Función auxiliar por si quieres borrar cajitas completas mediante la "✕" superior
function deleteNode(id) {
  if (!id) {
    console.warn("deleteNode: id inválido", id);
    return;
  }

  const nodeData = editor.getNodeFromId(id);

  if (!nodeData) {
    console.warn("deleteNode: nodo no encontrado", id);
    return;
  }

  // No permitir borrar el start
  if (
    nodeData.data &&
    nodeData.data.customId === "start"
  ) {
    alert("No puedes eliminar el nodo de inicio");
    return;
  }

  editor.removeNodeId(id);
}

// Función auxiliar para empaquetar y formatear la data de Drawflow para la Base de Datos
function exportCanvasData() {
  if (!editor) return { nodes: [], connections: [], flow: {} };

  const rawData = editor.export();
  const nodes = [];
  const connections = [];

  // Recorremos los nodos dibujados en pantalla
  Object.keys(rawData.drawflow.Home.data).forEach(key => {
    const node = rawData.drawflow.Home.data[key];
    
    // 🔥 FIX SEGURO DE SELECTOR: Busca por el ID nativo numérico de Drawflow que es el estándar en el DOM (#node-1, #node-2)
    let nodeElement = document.querySelector(`#node-${node.id}`);
    
    // Fallback por si tu frontend inyecta el customId directamente en el atributo id del DOM
    if (!nodeElement && node.data && node.data.customId) {
      nodeElement = document.querySelector(`#node-${node.data.customId}`) || document.getElementById(node.data.customId);
    }
    
    // 🔥 FALLBACK COGNITIVO: Leemos primero del objeto en memoria de Drawflow para evitar DOMs fríos en creación
    let content = node.data?.content || '';
    let inputType = node.data?.inputType || 'none';
    let options = (node.data && Array.isArray(node.data.options)) ? [...node.data.options] : [];

    if (nodeElement) {
      const textarea = nodeElement.querySelector('.node-content');
      const select = nodeElement.querySelector('.node-input-type');
      
      // Si el usuario ya escribió en el DOM, actualizamos con el valor del input en vivo
      if (textarea && textarea.value !== undefined && textarea.value !== '') content = textarea.value;
      if (select && select.value !== undefined) inputType = select.value;

      // 🔥 Extraer todos los textos de los botones de opciones controladas rellenados en orden
      const optionInputs = nodeElement.querySelectorAll('.node-option-text');
      if (optionInputs && optionInputs.length > 0) {
        options = [];
        optionInputs.forEach(input => {
          options.push(input.value.trim());
        });
      }
    } else {
      console.warn(`⚠️ No se encontró el elemento HTML en el DOM para el nodo ID: ${node.id}`);
    }

    // Identificador final unificado que guardaremos en Base de Datos para este nodo
    const finalNodeId = (node.data && node.data.customId)
      ? node.data.customId
      : `node_${node.id}`;

    // Empaquetamos la data del nodo con su arreglo de botones de opción estructurados
    nodes.push({
      id: finalNodeId,
      drawflowId: String(node.id),
      type: node.name,
      name: node.name,
      content: content,
      inputType: inputType,
      options: options,
      pos_x: Number(node.pos_x || 0),
      pos_y: Number(node.pos_y || 0),
      data: {
        ...(node.data || {}),
        customId: finalNodeId,
        content,
        inputType,
        options
      },
      inputs: node.inputs || {},
      outputs: node.outputs || {},
      class: node.class || '',
      html: node.html || ''
    });

    // Mapear uniones y cables ("Connections") asignándole la condición del texto del botón correspondiente
    Object.keys(node.outputs || {}).forEach(outputKey => {
      const outputIndex = parseInt(outputKey.replace('output_', '')) - 1;
      
      let conditionValue =
        (options[outputIndex] !== undefined &&
         options[outputIndex] !== "")
          ? options[outputIndex]
          : "Continuar";

      if (node.outputs[outputKey] && node.outputs[outputKey].connections) {
        node.outputs[outputKey].connections.forEach(conn => {
          const targetNodeData = rawData.drawflow.Home.data[conn.node];
          
          if (targetNodeData) {
            const finalTargetId =
              (targetNodeData.data && targetNodeData.data.customId)
                ? targetNodeData.data.customId
                : `node_${conn.node}`;

            connections.push({
              id: `conn_${node.id}_${outputKey}_to_${conn.node}`,
              sourceNodeId: finalNodeId,
              targetNodeId: finalTargetId,
              sourceDrawflowId: String(node.id),
              targetDrawflowId: String(conn.node),
              sourceOutput: outputKey,
              targetInput: conn.output,
              conditionValue: conditionValue
            });
          }
        });
      }
    });
  });

  return {
    nodes,
    connections,
    flow: rawData
  };
}

// 🔐 LOGIN
// =========================================

async function login(){

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    return alert("Completa email y contraseña");
  }

  try{

    console.log("🔥 LOGIN START");

    const res = await fetch(`${API}/login`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    });

    console.log("🔥 LOGIN STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 LOGIN RAW:",text);

    let data = {};

    try{
      data = JSON.parse(text);
    }catch(e){

      console.error("❌ RESPUESTA NO JSON");

      alert("El backend respondió HTML o texto.\n\nTu backend está mal configurado.");

      return;
    }

    if(data.error){
      return alert(data.error);
    }

    if(!data.token){
      return alert("No llegó token del backend");
    }

    token = data.token;

    localStorage.setItem("token",token);

    console.log("✅ LOGIN OK");

    render();

  }catch(err){

    console.error("❌ LOGIN ERROR:",err);

    alert("Error login\n\nRevisa consola");
  }
}

async function register(){

  const email = document.getElementById("email").value.trim();

  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    return alert("Completa email y contraseña");
  }

  try{

    console.log("🔥 REGISTER START");

    const res = await fetch(`${API}/register`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        password
      })
    });

    console.log("🔥 REGISTER STATUS:",res.status);

    const text = await res.text();

    console.log("🔥 REGISTER RAW:",text);

    let data = {};

    try{
      data = JSON.parse(text);
    }catch(e){

      console.error("❌ RESPUESTA REGISTER NO JSON");

      alert("Backend respondió HTML.\n\nEl fallback está rompiendo las APIs.");

      return;
    }

    if(data.error){
      return alert(data.error);
    }

    if(!data.token){
      return alert("No llegó token");
    }

    token = data.token;

    localStorage.setItem("token",token);

    console.log("✅ REGISTER OK");

    render();

  }catch(err){

    console.error("❌ REGISTER ERROR:",err);

    alert("Error registro");
  }
}

function eliminarArticulo(id) {

// ⚙️ TOGGLE FORM PANEL (Campos Secundarios)
// =========================================
function toggleFormPanel() {
  const panel = document.getElementById("formFieldsPanel");
  const text = document.getElementById("togglePanelText");
  
  if (!panel || !text) return;

  // Intercambia de forma segura las clases de visibilidad de Tailwind
  const isHidden = panel.classList.toggle("hidden");
  
  if (isHidden) {
    panel.classList.remove("block");
    text.innerText = "Mostrar Campos Secundarios";
  } else {
    panel.classList.add("block");
    text.innerText = "Ocultar Campos Secundarios";
  }
}

/**
 * Extrae la data visual del Canvas y la compila al formato limpio que requiere nuestra BD
 */
function procesarYGuardarMapaConceptual() {
  const rawData = dfEditor.export().drawflow.Home.data;
  
  const processedNodes = [];
  const processedConnections = [];
  
  // 1. Recorrer todos los elementos visuales creados para extraer sus valores reales desde el DOM
  Object.keys(rawData).forEach(nodeId => {
    const drawflowNode = rawData[nodeId];
    // Localizamos el contenedor del nodo en el árbol HTML real
    const nodeElement = document.getElementById(`node-${nodeId}`);
    
    let content = '';
    let conditionValue = '';
    let inputType = 'none';
    
    if (nodeElement) {
      const contentInput = nodeElement.querySelector('.node-content-input');
      if (contentInput) content = contentInput.value;
      
      const conditionInput = nodeElement.querySelector('.node-condition-input');
      if (conditionInput) conditionValue = conditionInput.value;
      
      const typeSelect = nodeElement.querySelector('.node-input-type-select');
      if (typeSelect) inputType = typeSelect.value;
    }
    
    // Construimos el nodo según nuestro esquema de Mongoose
    processedNodes.push({
      id: nodeId, // Vinculamos el ID del canvas
      type: drawflowNode.name,
      content: content,
      inputType: drawflowNode.name === 'input' ? inputType : 'none'
    });
    
    // 2. Extraer los cables / conexiones salientes de este nodo específico
    const outputs = drawflowNode.outputs;
    Object.keys(outputs).forEach(outputKey => {
      const connectionsList = outputs[outputKey].connections;
      connectionsList.forEach(conn => {
        processedConnections.push({
          id: `conn_${nodeId}_to_${conn.node}`,
          sourceNodeId: nodeId,
          targetNodeId: conn.node,
          conditionValue: drawflowNode.name === 'message' ? conditionValue : 'Continuar' 
          // Si es input o trigger, la transición no depende de un botón de opción específico, pasa directo
        });
      });
    });
  });

  // 3. Crear el Payload final consolidado
  const payload = {
    name: document.getElementById("bizName").value,
    slug: document.getElementById("bizSlug").value,
    nodes: processedNodes,
    connections: processedConnections
  };

  // 4. Envío de datos por tu canal AJAX convencional hacia el backend
  fetch('/api/business/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    if(data.success) {
      alert("¡Mapa conceptual de flujos guardado con éxito!");
    } else {
      alert("Error guardando el mapa conceptual.");
    }
  })
  .catch(err => console.error("Error crítico en guardado:", err));
}

let businessesAccordionOpen = true;

function toggleBusinessesAccordion(force = null){

  const accordion = document.getElementById("businessAccordion");

  const icon = document.getElementById("businessAccordionIcon");

  if(!accordion || !icon) return;

  // =========================================
  // 🔥 ESTADO FORZADO

  if(force !== null){

    businessesAccordionOpen = force;

  }else{

    businessesAccordionOpen = !businessesAccordionOpen;
  }

  // =========================================
  // 🔥 ABRIR
  // =========================================

  if(businessesAccordionOpen){

    accordion.style.display = "block";

    accordion.style.opacity = "1";

    accordion.style.maxHeight = "2000px";

    icon.style.transform = "rotate(0deg)";

  // =========================================

  // =========================================

  else{

// =========================================
function closeCreateBusinessModal() {
  const modal = document.getElementById("createBusinessModal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");

  // 1. Limpiar los inputs tradicionales del formulario maestro para que no queden remanentes
  const fields = ["bizName", "bizSlug", "welcomeMessage", "productInfo", "productLink", "whatsappNumber", "waMessage", "testimonials"];
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });

  // Ocultar la preview de la foto si existe
  const logoPreview = document.getElementById("logoPreview");
  if (logoPreview) logoPreview.classList.add("hidden");

  // 2. Destruir y vaciar el lienzo para liberar memoria
  if (editor) {
    try {
      editor.clear(); // Comando nativo de Drawflow para vaciar nodos y conexiones en memoria
    } catch (e) {
      console.warn("Drawflow ya estaba limpio o inactivo:", e);
    }
    editor = null; // Desvincular variable global
  }

  const container = document.getElementById('drawflow');
  if (container) {
    container.innerHTML = ''; // Limpieza física del HTML
  }
  
  // 3. Remover el ID de edición para asegurar que la próxima acción sea una creación limpia
  window.editingBusinessId = null;
  
  // Restaurar el botón de guardado a su estado original de creación si cambió a 'updateBusiness'

// =========================================
// 📥 LOAD LEADS
// =========================================

async function loadLeads(){

  if(!currentBusiness) return;

  try{

    const res = await fetch(`${API}/leads/${currentBusiness._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const data = await res.json();

    leads = data || [];

    renderLeads();

  }catch(err){

    console.error(err);
  }
}

// =========================================
// 🗑️ ELIMINAR LEAD
// =========================================

async function deleteLead(leadId){

  const confirmDelete = confirm("¿Eliminar este lead?");

  if(!confirmDelete) return;

  try{

    await fetch(`${API}/lead/${leadId}`,{
      method:"DELETE",
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    leads = leads.filter(l=>l._id !== leadId);

    renderLeads();

    if(currentLead && currentLead._id === leadId){

      currentLead = null;

      document.getElementById("chatMessages").innerHTML = "";
    }

  }catch(err){

    console.error(err);
  }
}

// =========================================
// ✅ MARCAR VENTA CERRADA
// =========================================

async function markLeadAsSold(lead){

  try{

    const res = await fetch(`${API}/lead/status/${lead._id}`,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },
      body:JSON.stringify({
        sold:true
      })
    });

    const data = await res.json();

    console.log("MARK SOLD RESPONSE:", data);

    if(!res.ok){

      console.error("ERROR:", data);

      return;
    }

    // 🔥 RECARGAR LEADS DESDE DB
    await loadLeads();

  }catch(err){

    console.error("MARK SOLD ERROR:", err);
  }
}

// =========================================
// 🔄 REABRIR LEAD
// =========================================

async function reopenLead(lead){

  try{

    const res = await fetch(`${API}/lead/status/${lead._id}`,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },
      body:JSON.stringify({
        sold:false
      })
    });

    const data = await res.json();

    console.log("REOPEN RESPONSE:", data);

    if(!res.ok){

      console.error("ERROR:", data);

      return;
    }

    // 🔥 RECARGAR LEADS DESDE DB
    await loadLeads();

  }catch(err){

  }

                py-2
                rounded-xl
                text-sm
                font-bold
                bg-red-500/10
                border
                border-red-500/20
                text-red-300
                hover:bg-red-500
                hover:text-white
                transition
              "
              onclick="event.stopPropagation(); deleteLead('${lead._id}')"
            >
              🗑️ Eliminar
            </button>

          </div>

        </div>

      `;

      div.onclick = ()=>openLeadConversation(lead);

      container.appendChild(div);
    });
  }
}

// =========================================
// 💬 OPEN LEAD CONVERSATION
// =========================================

async function openLeadConversation(lead){

  currentLead = lead;

  leadId = lead._id;

  conversationId = lead.conversationId;

  const container = document.getElementById("chatMessages");

  container.innerHTML = "";

  // =========================================
  // 📱 DETECTAR WHATSAPP DEL LEAD
  // =========================================

  let detectedPhone = "";

  // 🔥 SI YA EXISTE EN EL LEAD
  if(lead.phone){

    detectedPhone = String(lead.phone)
      .replace(/\D/g,"");
  }

  // =========================================
  // 🔥 HEADER FIJO CON BOTÓN WHATSAPP
  // =========================================

  const hero = document.createElement("div");

  hero.className = `
    sticky
    top-0
    z-50
    mb-4
    backdrop-blur-2xl
    bg-slate-950/80
    border-b
    border-white/10
    pb-4
  `;

  hero.innerHTML = `

    <div class="
      flex
      flex-col
      sm:flex-row
      sm:items-center
      sm:justify-between
      gap-4
      p-4
      rounded-3xl
      glass
      border
      border-white/10
    ">

      <!-- INFO -->
      <div class="min-w-0">

        <div class="
          text-xl
          font-black
          break-words
        ">
          ${lead.name || "Lead"}
        </div>

        <div class="
          text-sm
          text-slate-400
          break-all
          mt-1
        ">
          ${lead.phone || "Sin número"}
        </div>

      </div>

      <!-- ACTIONS -->
      <div class="
        flex
        flex-wrap
        gap-2
      ">

        ${
          detectedPhone
          ? `
            <a
              href="https://wa.me/${detectedPhone}"
              target="_blank"
              onclick="event.stopPropagation()"
              class="
                px-4
                py-2
                rounded-2xl
                text-sm
                font-bold
                bg-emerald-500/10
                border
                border-emerald-500/20
                text-emerald-300
                hover:bg-emerald-500
                hover:text-white
                transition
                flex
                items-center
                gap-2
              "
            >
              💬 WhatsApp
            </a>
          `
          : `
            <div
              class="
                px-4
                py-2
                rounded-2xl
                text-sm
                font-bold
                bg-white/5
                border
                border-white/10
                text-slate-500
              "
            >
              Sin WhatsApp
            </div>
          `
        }

      </div>

    </div>

  `;

  container.appendChild(hero);

  // =========================================
  // 💬 CONTENEDOR MENSAJES
  // =========================================

  const messagesWrap = document.createElement("div");

  messagesWrap.id = "leadConversationMessages";

  messagesWrap.className = `
    flex
    flex-col
    gap-3
    pb-10
  `;

  container.appendChild(messagesWrap);

  try{

    const res = await fetch(`${API}/conversation/${lead._id}`,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const messages = await res.json();

    // =========================================
    // 🔥 DETECTAR NÚMERO DESDE MENSAJES
    // =========================================

    messages.forEach(msg=>{

      if(
        !detectedPhone &&
        msg.role === "user"
      ){

        const match = String(msg.content || "")
          .match(/(\+?\d[\d\s\-]{7,20})/);

        if(match){

          detectedPhone = match[0]
            .replace(/\D/g,"");
        }
      }
    });

    // =========================================
    // 🔥 ACTUALIZAR BOTÓN SI DETECTÓ NÚMERO
    // =========================================

    if(
      detectedPhone &&
      !hero.querySelector("a")
    ){

      hero.querySelector(".flex.flex-wrap.gap-2").innerHTML = `

        <a
          href="https://wa.me/${detectedPhone}"
          target="_blank"
          onclick="event.stopPropagation()"
          class="
            px-4
            py-2
            rounded-2xl
            text-sm
            font-bold
            bg-emerald-500/10
            border
            border-emerald-500/20
            text-emerald-300
            hover:bg-emerald-500
            hover:text-white
            transition
            flex
            items-center
            gap-2
          "
        >
          💬 WhatsApp
        </a>

      `;
    }

    // =========================================
    // 💬 RENDER MENSAJES
    // =========================================

    messages.forEach(msg=>{

      addMessage(
        msg.content,
        msg.role === "assistant"
          ? "bot"
          : "user"
      );
    });

  }catch(err){

    console.error(err);
  }
}
// =========================================
// 💬 SEND MESSAGE
// =========================================

async function sendMessage(){

  if(!currentLead){
    return alert("Selecciona un lead");
  }

  const input = document.getElementById("messageInput");

  const value = input.value.trim();

  if(!value) return;

  addMessage(value,"user");

  input.value = "";

  await sendCloserMessage(value);
}

// =========================================
// 🤖 SEND CLOSER MESSAGE
// =========================================

async function sendCloserMessage(message){

  try{

    showTyping();

    const res = await fetch(`${API}/closer-message`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },
      body:JSON.stringify({
        businessId:currentBusiness._id,
        leadId,
        conversationId,
        message
      })
    });

    const data = await res.json();

    removeTyping();

    if(data.error){

      addMessage(data.error,"bot");

      return;
    }

    if(data.reply){

      addMessage(data.reply,"bot");
    }

  }catch(err){

    removeTyping();

    console.error(err);

    addMessage(
      "❌ Error enviando mensaje",
      "bot"
    );
  }
}

// =========================================
// 🤖 SEND TO BOT
// =========================================

async function sendToBot(message,hidden=false){

  if(!currentBusiness){
    return alert("Selecciona un negocio");
  }

  try{

    if(!hidden){
      showTyping();
    }

    const res = await fetch(`${API}/chat`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message,
        leadId,
        conversationId,
        businessId:currentBusiness._id
      })
    });

    const data = await res.json();

    removeTyping();

    if(data.error){

      addMessage(data.error,"bot");

      return;
    }

    leadId = data.leadId;

    conversationId = data.conversationId;

    if(data.reply){
      addMessage(data.reply,"bot");
    }

    renderOptions(data.options || []);

    if(data.showWhatsApp){

      addMessage(
        `🔥 WhatsApp listo: ${data.whatsappNumber}`,
        "bot"
      );
    }

  }catch(err){

    removeTyping();

    console.error(err);

    addMessage(
      "❌ Error conectando con Render backend",
      "bot"
    );
  }
}

// =========================================
// 🔥 OPTIONS
// =========================================

function renderOptions(options=[]){

  const container = document.getElementById("dynamicOptions");

  container.innerHTML = "";

  options.forEach(opt=>{

    const btn = document.createElement("button");

    btn.className = "bg-white/10 hover:bg-white/20 transition px-4 py-3 rounded-2xl";

    btn.innerText = opt.label;

    btn.onclick = async ()=>{

      addMessage(opt.label,"user");

      await sendToBot(opt.value,true);
    };

    container.appendChild(btn);
  });
}

// =========================================
// 💬 ADD MESSAGE
// =========================================

// =========================================
// 💬 ENVIAR Y MOSTRAR MENSAJES (ACTUALIZADA)
// =========================================
function addMessage(content, role) {
  // 1. Detectar el contenedor activo (chat principal o conversación de leads)
  const container = document.getElementById("chatMessages") || document.getElementById("leadConversationMessages");
  if (!container) return;

  const div = document.createElement("div");

  // Estilos base y animaciones alineados con el diseño de Prestige Closer
  div.className = `
    animate-fade
    w-fit
    max-w-full
    sm:max-w-[90%]
    lg:max-w-[80%]
    p-4
    sm:p-5
    rounded-3xl
    whitespace-pre-wrap
    break-words
    overflow-hidden
    shadow-sm
    ${
      role === "user"
      ? "message-user ml-auto text-white"
      : "message-bot mr-auto text-white bg-white/5 border border-white/10"
    }
  `;

  // 2. Procesamiento de Contenido Multimedia (Imágenes, Videos, Enlaces)
  if (typeof isMedia === "function" && isMedia(content)) {
    
    if (typeof isImage === "function" && isImage(content)) {
      div.innerHTML = `
        <img
          src="${content}"
          alt="Media"
          class="rounded-2xl max-w-full h-auto mb-2 object-cover block border border-white/10"
          onload="scrollToBottom('${container.id}')"
        />
      `;
    } 
    else if (typeof isVideo === "function" && isVideo(content)) {
      div.innerHTML = `
        <video
          controls
          class="rounded-2xl max-w-full w-full h-auto block border border-white/10"
          onloadedmetadata="scrollToBottom('${container.id}')"
        >
          <source src="${content}">
          Tu navegador no soporta reproducción de video.
        </video>
      `;
    } 
    else {
      div.innerHTML = `
        <div class="flex items-center gap-2">
          <span>🔗</span>
          <a
            href="${content}"
            target="_blank"
            class="underline text-emerald-400 hover:text-emerald-300 break-all transition-colors duration-200"
          >
            Abrir archivo multimedia
          </a>
        </div>
      `;
    }

  } else {
    // Texto plano o instrucciones de texto del bot / usuario
    div.innerText = content;
  }

  // 3. Insertar el mensaje en el DOM
  container.appendChild(div);

  // 4. Forzar Scroll inmediato
  scrollToBottom(container.id);
}

/**
 * Función auxiliar para garantizar que el scroll baje 
 * incluso si los recursos (imágenes/videos) se cargan de forma asíncrona.
 */
function scrollToBottom(containerId) {
  const container = document.getElementById(containerId);
  if (container) {
    container.scrollTop = container.scrollHeight;
  }
}

// =========================================
// ⏳ TYPING (Indicador de Escritura)
// =========================================

function showTyping() {
  const container = document.getElementById("chatMessages");
  if (!container) return;

  // Evitar duplicados
  if (document.getElementById("typing")) return;

  const div = document.createElement("div");
  div.id = "typing";
  div.className = `
    message-bot
    rounded-3xl
    p-4
    sm:p-5
    w-fit
    max-w-full
    animate-fade
    overflow-hidden
  `;

  div.innerHTML = `
    <div class="flex items-center justify-center min-w-[24px] min-h-[24px]">
      <div class="loader"></div>
    </div>
  `;

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const typing = document.getElementById("typing");
  if (typing) {
    typing.remove();
  }
}

// =========================================
// 🗑️ DELETE BUSINESS (Eliminar de la DB)
// =========================================

async function deleteBusiness(id) {
  if (!confirm("⚠️ ¿Estás completamente seguro de eliminar este negocio? Se perderán todos sus datos y leads asociados de forma permanente.")) return;

  try {
    const token = localStorage.getItem("token");
    const res = await fetch(`${API}/business/${id}`, {
      method: "DELETE",
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    if (!res.ok) {
      const errorData = await res.json().catch(() => ({}));
      throw new Error(errorData.error || "No se pudo eliminar el negocio en el servidor.");
    }

    alert("🗑️ Negocio eliminado con éxito.");

    // Si el negocio eliminado es el que está seleccionado actualmente en el chat, lo limpiamos
    if (typeof currentBusiness !== "undefined" && currentBusiness && currentBusiness._id === id) {
      currentBusiness = null;
      const chatTitle = document.getElementById("chatTitle");
      const chatMessages = document.getElementById("chatMessages");
      if (chatTitle) chatTitle.innerText = "Selecciona un negocio";
      if (chatMessages) chatMessages.innerHTML = "";
    }

    // Recargar la lista de negocios en la interfaz
    loadBusinesses();

  } catch (err) {
    console.error("❌ Error al eliminar el negocio:", err);
    alert(`No se pudo eliminar el negocio: ${err.message}`);
  }
}

// =========================================
// 📷 MEDIA DETECTORS (Detección Multimedia)
// =========================================

function isMedia(text) {
  if (!text) return false;
  return text.startsWith("http");
}

function isImage(url) {
  return /(jpg|jpeg|png|gif|webp)/i.test(url);
}

function isVideo(url) {
  return /(mp4|mov|webm|mkv)/i.test(url);
}

// =========================================
// ⌨️ ENTER SEND (Envío con Teclado)
// =========================================

document.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const active = document.activeElement;
    if (active && active.id === "messageInput") {
      sendMessage();
    }
  }
});

// =========================================
// 🏢 EDIT BUSINESS (Cargar datos en el Modal)
// =========================================

let editingBusinessId = null;

async function editBusiness(id) {
  // Guardamos el ID de forma global para usarlo en la actualización
  window.editingBusinessId = id; 

  try {
    const token = localStorage.getItem("token");
    const res = await fetch(`${API}/business-edit/${id}`, {
      method: "GET",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
      }
    });

    if (!res.ok) {
      console.error("Error cargando negocio:", await res.text());
      alert("No se pudo cargar la información del negocio para editar.");
      return;
    }

    const biz = await res.json();

    console.log("FLOW:", JSON.stringify(biz.flow, null, 2));
    console.log("NEGOCIO EDIT:", biz);
    console.log("NODES:", biz.nodes);
    console.log("CONNECTIONS:", biz.connections);

    // 1. Rellenar campos básicos del formulario en el Modal
    if (document.getElementById("bizName")) document.getElementById("bizName").value = biz.name || "";
    if (document.getElementById("bizSlug")) document.getElementById("bizSlug").value = biz.slug || "";
    if (document.getElementById("color")) document.getElementById("color").value = biz.primaryColor || "#25D366";
    if (document.getElementById("welcomeMessage")) document.getElementById("welcomeMessage").value = biz.welcomeMessage || "";
    if (document.getElementById("productInfo")) document.getElementById("productInfo").value = biz.productInfo || "";
    if (document.getElementById("productLink")) document.getElementById("productLink").value = biz.productLink || "";
    if (document.getElementById("waMessage")) document.getElementById("waMessage").value = biz.waMessage || "";

    // Manejo inteligente del número de WhatsApp y su prefijo de país
    if (document.getElementById("whatsappNumber")) {
      const num = biz.whatsappNumber || "";
      const countryCodeSelect = document.getElementById("countryCode");
      
      if (countryCodeSelect && num.startsWith("57") && num.length > 10) {
        countryCodeSelect.value = "57";
        document.getElementById("whatsappNumber").value = num.replace(/^57/, "");
      } else {
        document.getElementById("whatsappNumber").value = num;
      }
    }

    // Visualización de la vista previa del Logo de Marca
    const logoPreview = document.getElementById("logoPreview");
    if (logoPreview) {
      if (biz.logo) {
        logoPreview.src = biz.logo;
        logoPreview.classList.remove("hidden");
      } else {
        logoPreview.classList.add("hidden");
      }
    }

    // Carga de testimonios en un campo auxiliar oculto si es necesario
    if (biz.testimonials && document.getElementById("testimonials")) {
      document.getElementById("testimonials").value = JSON.stringify(biz.testimonials);
    }

    // 2. Abrir el modal de creación/edición de negocio
    openCreateBusinessModal();

    // 3. Renderizar dinámicamente el mapa de flujo visual en Drawflow
    setTimeout(() => {
      if (!window.editor) {
        console.warn("⚠️ El editor de Drawflow no está inicializado en 'window.editor'");
        return;
      }

      editor.clear();

      // Caso A: Si ya cuenta con el objeto nativo exportado por Drawflow
      if (biz.flow && biz.flow.drawflow) {
        editor.import(biz.flow);
      } 
      // Caso B: Reconstrucción del mapa Drawflow usando el array persistido de nodos y conexiones de la DB
      else if (biz.nodes && biz.nodes.length) {
        const drawflowData = {
          drawflow: {
            Home: {
              data: {}
            }
          }
        };

        // Estructurar nodos compatibles con el formato de renderizado del Canvas
        biz.nodes.forEach(node => {
          drawflowData.drawflow.Home.data[node.id] = {
            id: node.id,
            name: node.name || "node",
            data: node.data || {},
            class: node.class || "",
            html: node.html || node.label || "",
            typenode: false,
            inputs: node.inputs || {},
            outputs: node.outputs || {},
            pos_x: Number(node.pos_x ?? node.x ?? 100),
            pos_y: Number(node.pos_y ?? node.y ?? 100)
          };
        });

        // Enlazar de vuelta las conexiones entre salidas y entradas
        if (biz.connections && biz.connections.length) {
          biz.connections.forEach(conn => {
            const sourceNode = drawflowData.drawflow.Home.data[conn.output_id];
            if (!sourceNode) return;

            if (!sourceNode.outputs[conn.output_class]) {
              sourceNode.outputs[conn.output_class] = { connections: [] };
            }

            sourceNode.outputs[conn.output_class].connections.push({
              node: conn.input_id,
              output: conn.input_class
            });
          });
        }

        console.log("🛠️ Estructura Drawflow reconstruida con éxito:", drawflowData);
        editor.import(drawflowData);
      } 
      // Caso C: Si no hay información visual previa, se genera el nodo inicial por defecto
      else {
        if (typeof createStartNode === "function") {
          createStartNode();
        }
      }
    }, 150);

    // 4. Cambiar temporalmente el disparador del botón para Actualizar en lugar de Crear
    const btn = document.querySelector("#createBusinessModal button[onclick='createBusiness()']");
    if (btn) {
      btn.innerText = "Actualizar Negocio 🔄";
      btn.setAttribute("onclick", "updateBusiness()");
    }

  } catch (err) {
    console.error("❌ Error en editBusiness:", err);
    alert("Ocurrió un error inesperado al cargar la tienda.");
  }
}

// =========================================
// 🏢 UPDATE BUSINESS (Actualizar Datos y Flujo)
// =========================================

async function updateBusiness() {
  const businessId = window.editingBusinessId || (typeof editingBusinessId !== "undefined" ? editingBusinessId : null);
  if (!businessId) {
    return alert("❌ Error: No se encontró el identificador ID del negocio para actualizar.");
  }

  try {
    // 1. Lectura y formateo inicial de campos del formulario
    const name = document.getElementById("bizName")?.value?.trim();
    const slug = document.getElementById("bizSlug")?.value?.trim();
    const welcomeMessage = document.getElementById("welcomeMessage")?.value?.trim();
    const productInfo = document.getElementById("productInfo")?.value?.trim();
    const productLink = document.getElementById("productLink")?.value?.trim();
    const primaryColor = document.getElementById("color")?.value;
    const waMessage = document.getElementById("waMessage")?.value?.trim();

    // Formatear correctamente el número de WhatsApp usando el prefijo de país
    const countryCode = document.getElementById("countryCode")?.value || "";
    const phone = document.getElementById("whatsappNumber")?.value?.replace(/\D/g, "") || "";
    const whatsappNumber = countryCode + phone;

    // Validación exhaustiva de campos obligatorios
    if (!name || !slug || !welcomeMessage || !productInfo || !productLink || !whatsappNumber) {
      return alert("⚠️ Por favor completa todos los campos obligatorios del formulario.");
    }

    // 2. Extraer recursos multimedia opcionales (Logo y Testimonios en formato JSON)
    let logo = "";
    const logoPreview = document.getElementById("logoPreview");
    if (logoPreview && logoPreview.src && !logoPreview.src.endsWith('/')) {
      logo = logoPreview.src;
    }

    let testimonials = [];
    const hiddenTestimonials = document.getElementById("testimonials")?.value;
    if (hiddenTestimonials) {
      try { 
        testimonials = JSON.parse(hiddenTestimonials); 
      } catch(e) { 
        testimonials = []; 
      }
    }

    // 3. Obtener el mapa del lienzo Canvas de Drawflow
    let canvasData = { nodes: [], connections: [], flow: {} };
    try {
      if (typeof exportCanvasData === "function") {
        canvasData = exportCanvasData();
      } else {
        console.warn("⚠️ exportCanvasData no está definida. Se sincronizarán arrays vacíos.");
      }
    } catch (canvasErr) {
      console.error("❌ Error al exportar datos de nodos del Canvas:", canvasErr);
    }

    // 4. Construcción del objeto de envío (Payload)
    const body = {
      name,
      slug,
      primaryColor,
      welcomeMessage,
      productInfo,
      productLink,
      whatsappNumber,
      waMessage,
      logo,
      testimonials,
      nodes: canvasData.nodes || [],
      connections: canvasData.connections || [],
      flow: canvasData.flow || {}
    };

    console.log("🚀 Enviando actualización al servidor:", body);

    // 5. Petición PUT hacia el Backend en Render
    const token = localStorage.getItem("token");
    const res = await fetch(`${API}/business/${businessId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText || "Error en la respuesta de actualización del servidor.");
    }

    const data = await res.json();
    if (data.error) {
      return alert(`❌ Error del servidor: ${data.error}`);
    }

    alert("✅ ¡Negocio, vitrina y mapa conceptual de Prestige Closer actualizados correctamente!");
    
    // 6. Cerrar el modal y recargar la lista de tiendas
    closeCreateBusinessModal();
    loadBusinesses();

  } catch (err) {
    console.error("❌ Error en updateBusiness:", err);
    alert("Hubo un fallo crítico al intentar actualizar la tienda en el servidor. Revisa los logs de consola.");
  }
}

// =========================================
// 🔙 VOLVER (Retornar al listado de Leads)
// =========================================

function backToLeads() {
  currentLead = null;
  leadId = null;
  conversationId = null;

  const messagesContainer = document.getElementById("chatMessages");
  if (messagesContainer) {
    messagesContainer.innerHTML = "";
  }

  renderLeads();
}
