<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM PRO</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow: hidden;
}

/* =========================
   SIDEBAR (INBOX STYLE)
========================= */
#sidebar {
  width: 340px;
  background: rgba(2, 6, 23, 0.95);
  backdrop-filter: blur(10px);
  padding: 18px;
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.05);
}

/* LEAD CARD */
.lead {
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 10px;
  background: rgba(30, 41, 59, 0.7);
  cursor: pointer;
  transition: 0.25s;
  border: 1px solid transparent;
  position: relative;
}

.lead:hover {
  transform: translateY(-2px);
  background: rgba(51, 65, 85, 0.8);
  border: 1px solid rgba(37, 211, 102, 0.2);
}

.lead.active {
  background: linear-gradient(135deg, #25D366, #16a34a);
  color: #000;
  font-weight: 600;
  box-shadow: 0 10px 25px rgba(37, 211, 102, 0.2);
}

.name {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 4px;
}

.meta {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 2px;
}

/* =========================
   CHAT AREA (MODERN CRM)
========================= */
#chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: rgba(15, 23, 42, 0.6);
}

/* HEADER */
#chat-header {
  padding: 16px 20px;
  background: rgba(2, 6, 23, 0.9);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-weight: 600;
  letter-spacing: 0.3px;
}

/* =========================
   MESSAGES (WHATSAPP STYLE)
========================= */
#messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MESSAGE BUBBLES */
.msg {
  max-width: 65%;
  padding: 12px 14px;
  border-radius: 14px;
  word-wrap: break-word;
  font-size: 13px;
  line-height: 1.4;
  animation: fadeIn 0.2s ease;
}

/* USER */
.user {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  align-self: flex-end;
  border-bottom-right-radius: 6px;
}

/* BOT */
.bot {
  background: rgba(30, 41, 59, 0.9);
  align-self: flex-start;
  border-bottom-left-radius: 6px;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* =========================
   INPUT BAR (SAAS STYLE)
========================= */
#input-area {
  display: flex;
  padding: 12px;
  background: rgba(2, 6, 23, 0.95);
  border-top: 1px solid rgba(255,255,255,0.05);
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px 14px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  outline: none;
  background: rgba(15, 23, 42, 0.8);
  color: white;
  transition: 0.2s;
}

input:focus {
  border-color: #25D366;
  box-shadow: 0 0 0 2px rgba(37,211,102,0.15);
}

/* BUTTON */
button {
  padding: 12px 16px;
  background: linear-gradient(135deg, #25D366, #16a34a);
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 10px 20px rgba(37,211,102,0.2);
}

/* =========================
   SCROLLBAR (MODERNA)
========================= */
#sidebar::-webkit-scrollbar,
#messages::-webkit-scrollbar {
  width: 6px;
}

#sidebar::-webkit-scrollbar-thumb,
#messages::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}

#sidebar::-webkit-scrollbar-thumb:hover,
#messages::-webkit-scrollbar-thumb:hover {
  background: rgba(37,211,102,0.4);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- CHAT -->
<div id="chat">

  <div id="chat-header">
    Selecciona un lead
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <input id="input" placeholder="Responder..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>

</div>

<script>
const token = localStorage.getItem("token");

// 🔐 protección
if (!token) {
  window.location.href = "/";
}

let businessId = null;
let selectedLead = null;

// obtener slug de URL
const slug = window.location.pathname.split("/")[2];

// =========================
// 🔥 OBTENER BUSINESS ID AUTOMÁTICO
// =========================
async function loadBusiness() {
  try {
    const res = await fetch(`/business/${slug}`);
    const data = await res.json();

    if (!data._id) {
      alert("❌ Error cargando negocio");
      return;
    }

    businessId = data._id;

    loadLeads();
  } catch (err) {
    console.error("Error business:", err);
  }
}

// =========================
// 📊 LEADS
// =========================
async function loadLeads() {
  try {
    const res = await fetch(`http://localhost:3000/leads/${businessId}`, {
      headers: { Authorization: token }
    });

    // 🔥 validar respuesta antes de parsear
    if (!res.ok) {
      const text = await res.text();
      console.error("Respuesta no válida:", text);
      return;
    }

    const leads = await res.json();

    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = "";

    if (!Array.isArray(leads)) {
      console.error("Leads no es array:", leads);
      return;
    }

    leads.forEach(l => {
      const div = document.createElement("div");
      div.className = "lead";

      if (selectedLead && selectedLead._id === l._id) {
        div.classList.add("active");
      }

      div.innerHTML = `
        <div class="name">${l.name || "Sin nombre"}</div>
        <div class="meta">${l.email || ""}</div>
        <div class="meta">${l.phone || ""}</div>
        <div class="meta">🔥 ${l.stage}</div>
      `;

      div.onclick = () => selectLead(l, div);

      sidebar.appendChild(div);
    });

  } catch (err) {
    console.error("Error leads:", err);
  }
}

// =========================
// 💬 SELECCIONAR LEAD
// =========================
async function selectLead(lead, element) {
  selectedLead = lead;

  document.querySelectorAll(".lead").forEach(l => l.classList.remove("active"));
  element.classList.add("active");

  document.getElementById("chat-header").innerText =
    lead.name || "Sin nombre";

  loadConversation();
}

// =========================
// 💬 CARGAR CONVERSACIÓN
// =========================
async function loadConversation() {
  if (!selectedLead) return;

  try {
    const res = await fetch(`/conversation/${selectedLead._id}`);
    const messages = await res.json();

    const container = document.getElementById("messages");
    container.innerHTML = "";

    messages.forEach(m => {
      const div = document.createElement("div");
      div.className = "msg " + (m.role === "user" ? "user" : "bot");
      div.innerText = m.content;

      container.appendChild(div);
    });

    // 🔥 scroll automático
    container.scrollTop = container.scrollHeight;

  } catch (err) {
    console.error("Error conversación:", err);
  }
}

// =========================
// ✉️ ENVIAR MENSAJE MANUAL
// =========================
async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value;

  if (!message || !selectedLead) return;

  input.value = "";

  try {
    await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message,
        leadId: selectedLead._id,
        businessId
      })
    });

    loadConversation();

  } catch (err) {
    console.error("Error enviando mensaje:", err);
  }
}

// auto refresh
setInterval(() => {
  if (businessId) loadLeads();
  if (selectedLead) loadConversation();
}, 5000);

// iniciar
loadBusiness();
</script>

</body>
</html>
