<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* HEADER */
header {
  padding: 20px 40px;
  background: #020617;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #1e293b;
}

header div {
  font-weight: bold;
  font-size: 18px;
}

/* BOTÓN PRO */
.logout-btn {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border: none;
  padding: 10px 16px;
  color: white;
  border-radius: 8px;
  font-weight: bold;
  transition: 0.2s;
}

.logout-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px rgba(239,68,68,0.5);
}

/* CONTAINER */
.container {
  padding: 30px 40px;
  max-width: 1000px;
  margin: auto;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* FORM */
input {
  display: block;
  margin: 8px 0;
  padding: 12px;
  width: 100%;
  max-width: 350px;
  border: none;
  border-radius: 6px;
}

/* COLOR */
input[type="color"] {
  height: 50px;
}

/* FILE */
input[type="file"] {
  background: #020617;
  color: white;
}

/* PREVIEW */
#logoPreview {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
  margin-top: 10px;
  display: none;
}

/* BOTONES */
.create-btn {
  background: #25D366;
  padding: 12px;
  border: none;
  color: white;
  margin-top: 10px;
  border-radius: 8px;
}

.toggle-btn {
  background: #2563eb;
  padding: 12px;
  border: none;
  color: white;
  margin-bottom: 20px;
  border-radius: 8px;
}

/* LIST */
.business {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.links a {
  margin-left: 10px;
  color: #25D366;
  text-decoration: none;
}

.links button {
  margin-left: 10px;
  padding: 6px 10px;
  border: none;
  background: #334155;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.links button:hover {
  background: #475569;
}

/* STATES */
.empty {
  opacity: 0.6;
  text-align: center;
  padding: 20px;
}

.loading {
  opacity: 0.7;
}

/* HIDE FORM */
#formContainer {
  display: none;
}

/* TAG TEMPLATE */
.template-tag {
  background: #9333ea;
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 11px;
  margin-left: 5px;
}

/* 🔥 ANALYTICS PANEL */
#analyticsPanel {
  display: none;
}

/* PREVIEW EDIT */
#edit_logoPreview {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
  margin-top: 10px;
  display: none;
}

/* ERROR INPUT */
.input-error {
  border: 2px solid #ef4444 !important;
}

.error-text {
  color: #ef4444;
  font-size: 13px;
  margin-top: 5px;
}

textarea {
  display: block;
  margin: 8px 0;
  padding: 12px;
  width: 100%;
  max-width: 350px;
  border: none;
  border-radius: 6px;
  min-height: 120px;
  resize: vertical;
  font-family: "Inter", sans-serif;
}

/* 🔥 MODAL OVERLAY */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);

  display: none;
  justify-content: center;
  align-items: center;

  z-index: 999;
}

.modal-overlay.active {
  display: flex;
}

/* CAJA */
.modal-box {
  background: #1e293b;
  padding: 25px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;

  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  animation: modalFade 0.25s ease;
}

/* HEADER */
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

/* BOTÓN CERRAR */
.modal-close {
  background: #334155;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.modal-close:hover {
  background: #475569;
}

/* BODY */
.modal-body p {
  margin: 6px 0;
}

/* ANIMACIÓN */
@keyframes modalFade {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.market-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.market-card {
  background: #1e293b;
  border-radius: 14px;
  overflow: hidden;
  transition: 0.25s;
  cursor: pointer;
  position: relative;
}

.market-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.market-preview {
  height: 150px;
  background-size: cover;
  background-position: center;
}

.market-content {
  padding: 15px;
}

.market-title {
  font-weight: bold;
  font-size: 16px;
}

.market-desc {
  font-size: 13px;
  opacity: 0.7;
  margin: 5px 0 10px;
}

.market-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.market-price {
  color: #25D366;
  font-weight: bold;
}

.market-btn {
  background: #25D366;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.preview-msg {
  max-width: 75%;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.4;
}

.preview-user {
  background: #2563eb;
  align-self: flex-end;
}

.preview-bot {
  background: #1e293b;
  align-self: flex-start;
}

/* =========================
   🔥 RESPONSIVE MOBILE
========================= */
@media (max-width: 768px) {

  header {
    flex-direction: column;
    gap: 10px;
    padding: 15px;
    text-align: center;
  }

  header div {
    font-size: 16px;
  }

  .container {
    padding: 15px;
  }

  .card {
    padding: 15px;
  }

  input, textarea {
    max-width: 100%;
  }

  .create-btn,
  .toggle-btn {
    max-width: 100%;
    width: 100%;
  }

  .business {
    flex-direction: column;
    align-items: flex-start;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .links a,
  .links button {
    margin-left: 0;
  }

  .market-grid {
    grid-template-columns: 1fr;
  }

  .modal-box {
    width: 95%;
    padding: 15px;
  }
}

@media (max-width: 420px) {

  header div {
    font-size: 14px;
  }

  .logout-btn {
    width: 100%;
  }

  .market-preview {
    height: 120px;
  }
}
#createModal.active {
  display: flex;
}
</style>
</head>

function openPreview(id) {
  const t = templates.find(x => x.id === id);
  if (!t) return;

  const modal = document.getElementById("previewModal");
  const chat = document.getElementById("previewChat");

  modal.style.display = "flex";
  chat.innerHTML = "";

  let i = 0;

  function nextMessage() {
    if (i >= t.demo.length) return;

    const msg = t.demo[i];

    const div = document.createElement("div");
    div.className = "preview-msg " + (msg.role === "user" ? "preview-user" : "preview-bot");
    div.innerText = msg.text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;

    i++;

    setTimeout(nextMessage, 800);
  }

  nextMessage();
}

  }

async function createBusiness() { 
  const msg = document.getElementById("createMsg");
  const file = document.getElementById("logoFile").files[0];

  let logoBase64 = "";

  if (file) {
    logoBase64 = await toBase64(file);
  }

  const slugInput = document.getElementById("slug");
  slugInput.classList.remove("input-error");

  // 🔥 NUEVO: selector de país
  const countryCode = document.getElementById("countryCode").value;
  const waNumber = document.getElementById("wa").value;

  const fullNumber = countryCode + waNumber;

  // 🔥 NUEVO: mensaje WhatsApp del cliente
  const waMessage = document.getElementById("waMessage").value;

  // 🔥 ACTUALIZADO: TESTIMONIOS (USANDO EL ARRAY DE R2 SI EXISTE, O EL INPUT)
  // Esta parte prioriza los archivos subidos a R2 que guardamos en la variable global
  let testimonials = [];
  
  if (typeof uploadedTestimonials !== 'undefined' && uploadedTestimonials.length > 0) {
    // Si usaste el nuevo sistema de archivos R2
    testimonials = uploadedTestimonials;
  } else {
    // Fallback: Si por alguna razón usaste el campo de texto (compatibilidad)
    const testimonialsRaw = document
      .getElementById("testimonials")
      .value
      .split("\n")
      .filter(t => t.trim() !== "");

    testimonials = testimonialsRaw.map(t => {
      const link = t.trim();
      // Detectar si es imagen (incluye detección de R2 por extensión)
      if (link.match(/\.(jpeg|jpg|gif|png|webp)$/i) || link.startsWith("data:image") || link.includes("googleusercontent.com")) {
        return { type: "image", content: link };
      }
      // Detectar si es video
      if (link.includes("youtube.com") || link.includes("youtu.be") || link.match(/\.(mp4|webm|ogg)$/i)) {
        return { type: "video", content: link };
      }
      // Por defecto es texto
      return { type: "text", content: link };
    });
  }

  const data = {
    name: document.getElementById("name").value,
    slug: slugInput.value,
    logo: logoBase64,
    primaryColor: document.getElementById("color").value,
    welcomeMessage: document.getElementById("welcome").value,
    productInfo: document.getElementById("info").value,
    productLink: document.getElementById("link").value,
    whatsappNumber: fullNumber,
    waMessage: waMessage,

    // 🔥 NUEVO
    testimonials: testimonials
  };

  msg.innerText = "Creando...";

  try {
    const res = await fetch(`${API}/business`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token // 🔥 FIX REAL AQUÍ
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();

    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      console.error("RESPUESTA NO JSON:", text);
      msg.innerText = "❌ Error de red";
      return;
    }

    if (result.business) {
      msg.innerHTML = `✅ Negocio creado<br/><br/>
      💬 <a href="${result.url}" target="_blank">${result.url}</a>`;

      document.getElementById("name").value = "";
      document.getElementById("slug").value = "";
      document.getElementById("welcome").value = "";
      document.getElementById("info").value = "";
      document.getElementById("link").value = "";
      document.getElementById("wa").value = "";
      document.getElementById("waMessage").value = "";
      document.getElementById("testimonials").value = ""; // 🔥 LIMPIAR
      document.getElementById("logoFile").value = "";
      
      // Limpiar lista de R2 si existe
      if (document.getElementById("testimonialsList")) {
          document.getElementById("testimonialsList").innerHTML = "";
          uploadedTestimonials = []; 
      }

      document.getElementById("countryCode").value = "57";

      const preview = document.getElementById("logoPreview");
      preview.src = "";
      preview.style.display = "none";

      const form = document.getElementById("formContainer");
      if (form) form.style.display = "none";

      loadBusinesses();
    }
    else {
      if (result.error === "Slug ya existe") {
        slugInput.classList.add("input-error");

        const base = slugInput.value.replace(/[^a-z0-9]/gi, "").toLowerCase();
        const sugerido = base + Math.floor(Math.random() * 999);

        msg.innerHTML = `
          <span class="error-text">
            ❌ Ese slug ya está en uso<br/>
            👉 Prueba este: <b>${sugerido}</b>
            <br/><br/>
            <button onclick="usarSlug('${sugerido}')" 
              style="margin-top:5px; padding:6px 10px; border:none; border-radius:6px; background:#25D366; color:white; cursor:pointer;">
              Usar este
            </button>
          </span>
        `;
      } 
      else {
        msg.innerText = result.error || "Error";
      }
    }

  } catch (err) {
    console.error("CREATE BUSINESS ERROR:", err);
    msg.innerText = "❌ Error de red";
  }
}

  // 🔥 SOLUCIÓN CRÍTICA: PROCESADOR DE TESTIMONIOS EN EDICIÓN (INTEGRADO CON R2)
  let testimonials = [];
  
  // 1. Capturamos lo que haya en el campo de texto (links manuales o existentes)
  const testimonialsRaw = document
    .getElementById("edit_testimonials")
    .value
    .split("\n")
    .filter(t => t.trim() !== "");

  const manualTestimonials = testimonialsRaw.map(t => {
    const link = t.trim();

    if (link.match(/\.(jpeg|jpg|gif|png|webp)$/i) || link.startsWith("data:image") || link.includes("googleusercontent.com")) {
      return { type: "image", content: link };
    }
    // Detectar Video
    if (link.includes("youtube.com") || link.includes("youtu.be") || link.match(/\.(mp4|webm|ogg)$/i)) {
      return { type: "video", content: link };
    }
    return { type: "text", content: link };
  });

  // 2. Combinamos con los nuevos archivos recién subidos a R2 durante esta edición
  if (typeof editUploadedTestimonials !== 'undefined' && editUploadedTestimonials.length > 0) {
    testimonials = [...manualTestimonials, ...editUploadedTestimonials];

  const data = {

    if (result.business) {

      // Limpiar estados de edición

          document.getElementById("edit_testimonialsList").innerHTML = "";
          editUploadedTestimonials = [];
      }
      
      document.getElementById("editModal").style.display = "none";
      loadBusinesses();
    } else {
      if (result.error === "Slug ya existe") {
        slugInput.classList.add("input-error");

        const base = slugInput.value.replace(/[^a-z0-9]/gi, "").toLowerCase();
        const sugerido = base + Math.floor(Math.random() * 999);

        msg.innerHTML = `
          <span class="error-text">
            ❌ Ese slug ya está en uso<br/>
            👉 Prueba este: <b>${sugerido}</b>
            <br/><br/>
            <button onclick="usarSlugEdit('${sugerido}')" 
              style="margin-top:5px; padding:6px 10px; border:none; border-radius:6px; background:#25D366; color:white; cursor:pointer;">
              Usar este
            </button>
          </span>
        `;
      } 
      else {
        msg.innerText = result.error || "Error";
      }
    }

  } catch {
    msg.innerText = "❌ Error de red";
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

async function uploadToR2() {
  const fileInput = document.getElementById("testimonialFile");
  const list = document.getElementById("testimonialsList");
  const status = document.getElementById("createMsg");
  
  if (!fileInput.files.length) return;

  status.innerText = "Subiendo archivos a R2...";
  
  for (const file of fileInput.files) {
    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch("/upload-testimonial", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (data.url) {
        const type = file.type.startsWith("video") ? "video" : "image";
        uploadedTestimonials.push({ type, content: data.url });

        // Miniatura de previsualización
        const thumb = document.createElement("div");
        thumb.style.cssText = "width: 50px; height: 50px; border-radius: 5px; overflow: hidden; background: #eee; position: relative;";
        
        if (type === "image") {
          thumb.innerHTML = `<img src="${data.url}" style="width: 100%; height: 100%; object-fit: cover;">`;
        } else {
          thumb.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; height:100%; font-size:10px;">🎥</div>`;
        }
        
        list.appendChild(thumb);
      }
    } catch (err) {
      console.error("Error subiendo archivo:", err);
    }
  }

  // Actualizamos el valor del input oculto para que createBusiness() lo tome
  document.getElementById("testimonials").value = uploadedTestimonials
    .map(t => t.content)
    .join("\n");
    
  status.innerText = "✅ Archivos listos";
}

async function uploadEditToR2() {
  const fileInput = document.getElementById("edit_testimonialFile");
  const list = document.getElementById("edit_testimonialsList");
  const status = document.getElementById("editMsg");
  
  if (!fileInput.files.length) return;

  status.innerText = "Subiendo archivos a R2...";
  status.style.color = "#fbbf24";
  
  for (const file of fileInput.files) {
    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch("/upload-testimonial", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (data.url) {
        const type = file.type.startsWith("video") ? "video" : "image";
        editUploadedTestimonials.push({ type, content: data.url });

        // Miniatura
        const thumb = document.createElement("div");
        thumb.style.cssText = "width: 50px; height: 50px; border-radius: 5px; overflow: hidden; background: #0f172a; border: 1px solid #334155; position: relative;";
        
        if (type === "image") {
          thumb.innerHTML = `<img src="${data.url}" style="width: 100%; height: 100%; object-fit: cover;">`;
        } else {
          thumb.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; height:100%; font-size:10px;">🎥</div>`;
        }
        
        list.appendChild(thumb);
      }
    } catch (err) {
      console.error("Error subiendo archivo:", err);
    }
  }

  // Sincronizamos con el input oculto
  document.getElementById("edit_testimonials").value = editUploadedTestimonials
    .map(t => t.content)
    .join("\n");
    
  status.innerText = "✅ Archivos cargados correctamente";
  status.style.color = "#22c55e";
}
</script>
