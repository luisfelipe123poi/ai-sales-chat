<!DOCTYPE html>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

/* 🔥 ESTILIZACIÓN DEL SCROLLBAR PROFESIONAL */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-track {
  background: rgba(2, 6, 23, 0.8);
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #22c55e, #3b82f6);
  border-radius: 10px;
  border: 2px solid rgba(2, 6, 23, 1);
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #16a34a, #2563eb);
  box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
}

/* Para Firefox */
html {

  scroll-behavior: smooth;
}

body {

  width: 100vw;
  background: linear-gradient(-45deg, #020617, #0f172a, #1e1b4b, #020617);

  background-attachment: fixed;
  position: relative;
  color: white;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }

/* Ruido de fondo mediante SVG integrado (Evita error 404) */


/* NAV MEJORADO PARA MÓVILES */
nav {

  height: 70px;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
  font-weight: bold;
  font-size: 18px;
  letter-spacing: -0.5px;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

nav button {
  padding: 10px 18px;
  border: none;
  cursor: pointer;
  border-radius: 10px;
  font-weight: bold;
  transition: 0.3s;
  font-size: 13px;
  white-space: nowrap;
}

nav button:first-child {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);

}

nav button:last-child {

}

section {

  justify-content: center;

  position: relative;
}

/* 🔥 HERO */

#animatedText {

  line-height: 1.1;
  margin-bottom: 20px;
  background: linear-gradient(90deg, #fff, #22c55e, #3b82f6);
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: -1px;
  min-height: 120px;
  display: inline;
}

.cursor {
  display: inline-block;
  width: 4px;
  height: 0.9em;
  background: #22c55e;
  margin-left: 8px;
  animation: blink 0.8s infinite;
  vertical-align: middle;
}

@keyframes blink { 50% { opacity: 0; } }

.hero p {
  color: #94a3b8;
  font-size: clamp(16px, 2.5vw, 20px);
  max-width: 650px;
  font-weight: 400;
  margin-top: 20px;
}

.scroll-indicator {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  opacity: 0.6;
}

.mouse {
  width: 22px;
  height: 35px;
  border: 2px solid white;
  border-radius: 20px;
  position: relative;
}

.wheel {
  width: 4px;
  height: 8px;
  background: white;
  border-radius: 2px;
  position: absolute;
  top: 5px;
  left: 50%;
  transform: translateX(-50%);
  animation: scrollMouse 2s infinite;
}

@keyframes scrollMouse {
  0% { top: 5px; opacity: 1; }
  100% { top: 20px; opacity: 0; }
}

  #animatedText { font-size: 26px; min-height: 140px; }
}
</style>

function loadTemplates() {
  const container = document.getElementById("templates");

  if (!container || !Array.isArray(templatesData)) return;

  container.innerHTML = "";

  templatesData.forEach((t, index) => {
    const div = document.createElement("div");
    div.className = "template-card " + (t.class || "");
    div.id = "card-" + index;

    div.onmouseenter = pauseCarousel;
    div.onmouseleave = resumeCarousel;

    div.innerHTML = `
      <img src="${t.img || ''}" alt="${t.name || 'template'}">
      <div class="template-body">
        <h3>${t.name || ''}</h3>

        <div class="chat-preview" id="chat-${index}"></div>

        <button class="use-btn" onclick="useTemplate(${index})">
          🚀 Usar plantilla
        </button>
      </div>
    `;

    container.appendChild(div);

    if (t.chat) {
      renderChat(t.chat, `chat-${index}`);
    }
  });

  updateCarousel();
  resumeCarousel();
}

function updateCarousel() {
  templatesData.forEach((_, i) => {
    const el = document.getElementById("card-" + i);
    if(el) el.classList.remove("active");
  });
  const currentEl = document.getElementById("card-" + current);
  if(currentEl) {
    currentEl.classList.add("active");
    if(window.innerWidth < 768) {
        currentEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  }
}

function nextSlide() {
  current = (current + 1) % templatesData.length;
  updateCarousel();
}

function pauseCarousel() { clearInterval(carouselInterval); }
function resumeCarousel() { 
  clearInterval(carouselInterval);
  carouselInterval = setInterval(nextSlide, 6000); 
}

function renderChat(chat, id) {
  const container = document.getElementById(id);
  function play() {
    container.innerHTML = "";
    let i = 0;
    function next() {
      if (i >= chat.length) { setTimeout(play, 3000); return; }
      const [role, text] = chat[i];
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerText = text;
      container.appendChild(div);
      setTimeout(() => { container.scrollTo({ top: container.scrollHeight, behavior: "smooth" }); }, 50);
      i++;
      setTimeout(next, 1200);
    }
    next();
  }
  play();
}

window.addEventListener("scroll", () => {
  const marketplace = document.getElementById("sec-1");
  const rect = marketplace.getBoundingClientRect();
  if (rect.top < window.innerHeight / 2) {
    document.body.classList.add("in-marketplace");
  } else {
    document.body.classList.remove("in-marketplace");
  }
});

function animateHeroText() {
  const el = document.getElementById("animatedText");
  const phrases = [
    "Reemplaza tu WhatsApp y convierte cada mensaje en ventas automáticas",
    "Automatiza ventas sin responder manualmente",
    "Cierra clientes 24/7 con IA"
  ];
  let phraseIndex = 0;

  function startDots(callback) {
    let dots = 0;
    const dotsInterval = setInterval(() => {
      dots = (dots + 1) % 4;
      el.textContent = ".".repeat(dots);
    }, 300);
    
    setTimeout(() => { 
        clearInterval(dotsInterval); 
        el.textContent = ""; 
        callback(); 
    }, 1200);
  }

  function type(text, callback) {
    let i = 0;
    el.textContent = "";
    function write() {
      if (i < text.length) {
        el.textContent += text[i];
        i++;
        setTimeout(write, 40);
      } else { 
        setTimeout(callback, 2500); 
      }
    }
    write();
  }

  function erase(callback) {
    let text = el.textContent;
    function remove() {
      if (text.length > 0) {
        text = text.slice(0, -1);
        el.textContent = text;
        setTimeout(remove, 20);
      } else { 
        callback(); 
      }
    }
    remove();
  }

  function loop() {
    startDots(() => {
      type(phrases[phraseIndex], () => {
        erase(() => {
          phraseIndex = (phraseIndex + 1) % phrases.length;
          loop();
        });
      });
    });
  }
  loop();
}

function openModal(type) {
  mode = type;
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalTitle").innerText = type === "login" ? "Bienvenido de nuevo" : "Crea tu cuenta gratis";
  document.getElementById("msg").innerText = "";
}

function closeModal() { document.getElementById("modal").style.display = "none"; }

function useTemplate() { openModal("register"); }

// 🔥 FUNCIÓN DE AUTENTICACIÓN INTEGRADA
async function submitAuth() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "Por favor completa todos los campos";
    return;
  }

  msg.innerText = "Cargando...";
  msg.style.color = "#3b82f6";

  try {
    const endpoint = mode === "login" ? "/login" : "/register";

    const res = await fetch(`${API}${endpoint}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const text = await res.text();
    let data;

    try {
      data = JSON.parse(text);
    } catch {
      msg.innerText = "Error de conexión con el servidor";
      msg.style.color = "#f87171";
      return;
    }

    if (data.token) {
      localStorage.setItem("token", data.token);
      // Redirección exitosa
      window.location.href = "/dashboard";
    } else {
      msg.innerText = data.error || "Error al procesar la solicitud";
      msg.style.color = "#f87171";
    }

  } catch (error) {
    msg.innerText = "Error de red: no se pudo contactar al servidor";
    msg.style.color = "#f87171";
  }
}
